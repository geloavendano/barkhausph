<!DOCTYPE html>
<html lang="en">
<head>
<!-- Google Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-LBWQT2HSGQ"></script>
<script>

  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-LBWQT2HSGQ');

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<link rel="icon" type="image/png" sizes="32x32" href="images/favicon-32.png">
<title>Barkhaus Admin</title>
<script src="supabase.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>

  :root{--bg:#0F1C26;--surface:#1A3044;--raised:#1F3D55;--border:rgba(77,150,185,0.22);--mid:#6AAEC8;--cream:#F0EDE6;--cream-m:#B8D4E0;--blue:#4D96B9;--yellow:#FFCE58;--error:#FF6B6B;--success:#6BCB77;--amber:#EF9F27;--pink:#D4537E;--teal:#1D9E75;--purple:#9B95E8;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--cream);font-family:"Nunito",sans-serif;font-size:13px;height:100svh;overflow:hidden;display:flex;flex-direction:column;}
  /* GATE */
  #gate{position:fixed;inset:0;background:var(--bg);z-index:999;display:flex;align-items:center;justify-content:center;padding:24px;}
  .gate-card{background:var(--surface);border:0.5px solid var(--border);border-radius:16px;padding:32px 28px;width:100%;max-width:320px;text-align:center;}
  .gate-logo{font-family:"Fredoka One",cursive;font-size:22px;color:var(--cream);margin-bottom:4px;}.gate-logo span{color:var(--yellow);}
  .gate-sub{font-size:12px;color:var(--mid);margin-bottom:20px;}
  .gate-input{width:100%;background:var(--raised);border:1.5px solid var(--border);border-radius:10px;padding:11px 14px;color:var(--cream);font-family:"Nunito",sans-serif;font-size:15px;outline:none;margin-bottom:10px;text-align:center;letter-spacing:0.1em;}
  .gate-input:focus{border-color:var(--blue);}
  .gate-btn{width:100%;background:var(--yellow);color:var(--bg);border:none;border-radius:50px;padding:11px;font-size:13px;font-weight:700;cursor:pointer;font-family:"Nunito",sans-serif;}
  .gate-error{font-size:12px;color:var(--error);margin-top:8px;font-weight:600;min-height:16px;}
  /* APP */
  #app{display:none;flex-direction:column;height:100svh;overflow:hidden;}
  #app.visible{display:flex;}
  /* TOP BAR */
  .topbar{background:var(--surface);border-bottom:0.5px solid var(--border);padding:0 16px;height:48px;display:flex;align-items:center;gap:12px;flex-shrink:0;z-index:20;}
  .topbar-logo{font-family:"Fredoka One",cursive;font-size:17px;color:var(--cream);}
  .topbar-logo span{color:var(--yellow);}
  .date-nav{display:flex;align-items:center;gap:6px;margin-left:auto;}
  .dnb{width:28px;height:28px;border-radius:6px;border:0.5px solid var(--border);background:transparent;cursor:pointer;color:var(--mid);display:flex;align-items:center;justify-content:center;font-size:13px;font-family:"Nunito",sans-serif;}
  .dnb:hover{background:var(--raised);}
  .date-label{font-size:13px;font-weight:700;color:var(--cream);min-width:144px;text-align:center;}
  .today-btn{font-size:11px;font-weight:700;padding:4px 12px;border-radius:20px;border:0.5px solid var(--border);background:transparent;cursor:pointer;color:var(--mid);font-family:"Nunito",sans-serif;}
  .today-btn:hover{background:var(--raised);}
  /* BODY */
  .body{display:flex;flex:1;overflow:hidden;}
  /* SIDEBAR */
  .sidebar{width:196px;flex-shrink:0;border-right:0.5px solid var(--border);display:flex;flex-direction:column;overflow:hidden;transition:width 0.25s cubic-bezier(0.4,0,0.2,1);background:var(--bg);}
  .sb-sticky-top{flex-shrink:0;background:var(--bg);z-index:2;}
  .sb-scroll{flex:1;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--raised) transparent;}
  .sidebar.collapsed .sb-scroll{display:none;}
  .sidebar.collapsed .sb-sticky-top .admin-nav,
  .sidebar.collapsed .sb-sticky-top .branch-tabs{display:none;}
  .sidebar.collapsed{width:40px;}
  .sb-toggle{width:28px;height:28px;background:var(--surface);border:0.5px solid var(--border);border-radius:6px;cursor:pointer;color:var(--mid);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:14px;transition:background 0.15s;}
  .sb-toggle:hover{background:var(--raised);}
  .fab{position:fixed;bottom:24px;right:24px;background:var(--yellow);color:#3d2e00;border:none;border-radius:50px;padding:11px 20px;font-size:13px;font-weight:700;cursor:pointer;font-family:"Nunito",sans-serif;z-index:50;display:flex;align-items:center;gap:6px;box-shadow:none;}
  .fab-group{position:fixed;bottom:24px;right:24px;z-index:50;display:flex;flex-direction:column;align-items:flex-end;gap:8px;}
  .fab-main{background:var(--yellow);color:#3d2e00;border:none;border-radius:50%;width:48px;height:48px;font-size:22px;font-weight:700;cursor:pointer;font-family:"Nunito",sans-serif;display:flex;align-items:center;justify-content:center;transition:transform 0.2s;flex-shrink:0;}
  .fab-main.open{transform:rotate(45deg);}
  .fab-actions{display:flex;flex-direction:column;align-items:flex-end;gap:6px;}
  .fab-action{background:var(--surface);border:0.5px solid var(--border);color:var(--cream);border-radius:50px;padding:8px 14px;font-size:12px;font-weight:700;cursor:pointer;font-family:"Nunito",sans-serif;white-space:nowrap;transition:background 0.15s;}
  .fab-action:hover{background:var(--raised);}
  .branch-tabs{display:flex;gap:4px;padding:8px;border-bottom:0.5px solid var(--border);}
  .br-tab{flex:1;font-size:11px;font-weight:700;padding:5px 4px;border-radius:20px;border:0.5px solid var(--border);cursor:pointer;background:transparent;color:var(--mid);font-family:"Nunito",sans-serif;text-align:center;transition:all 0.15s;}
  .br-tab.on{background:var(--yellow);border-color:var(--yellow);color:#3d2e00;}
  .sb-sec{padding:8px 8px 4px;}
  .sb-sec-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px;}
  .sb-sec-title{font-size:9px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--mid);}
  .sb-item{display:flex;align-items:center;gap:7px;padding:5px 7px;border-radius:7px;cursor:pointer;transition:background 0.12s;margin-bottom:2px;user-select:none;}
  .sb-item:hover{background:var(--raised);}
  .sb-item.on{background:var(--raised);outline:0.5px solid var(--border);}
  .sb-dot{width:9px;height:9px;border-radius:2px;flex-shrink:0;}
  .sb-dot.round{border-radius:50%;}
  .sb-lbl{font-size:12px;color:var(--cream-m);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .sb-item.on .sb-lbl,.sb-item:hover .sb-lbl{color:var(--cream);}
  .sb-ct{font-size:10px;font-weight:700;color:var(--mid);min-width:12px;text-align:right;}
  .sb-lock{font-size:10px;color:var(--amber);}
  .sb-unavail{font-size:10px;color:var(--error);}
  .sb-edit{font-size:10px;color:var(--mid);opacity:0;padding:1px 5px;border-radius:4px;border:0.5px solid var(--border);background:transparent;cursor:pointer;font-family:"Nunito",sans-serif;transition:opacity 0.15s;}
  .sb-item:hover .sb-edit{opacity:1;}
  .sb-add-btn{width:100%;padding:5px 7px;font-size:11px;color:var(--mid);background:transparent;border:0.5px dashed var(--border);border-radius:7px;cursor:pointer;font-family:"Nunito",sans-serif;text-align:left;margin:4px 0;}
  .sb-add-btn:hover{border-color:var(--blue);color:var(--blue);}
  .bk-svc-filter-btn.on{background:var(--raised);color:var(--cream);font-weight:700;}
  .bk-svc-filter-btn:hover{background:var(--raised);}
  .sb-div{height:0.5px;background:var(--border);margin:4px 8px;}
  /* MAIN */
  .main-content{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}
  /* SVC TABS */
  .svc-tabs{display:flex;border-bottom:0.5px solid var(--border);background:var(--surface);flex-shrink:0;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
  .svc-tabs::-webkit-scrollbar{display:none;}
  .svc-tab{padding:10px 20px;cursor:pointer;border-bottom:2.5px solid transparent;transition:border-color 0.15s,background 0.15s;flex-shrink:0;}
  .svc-tab:hover{background:var(--raised);}
  .svc-tab.on{border-bottom-color:currentColor;}
  .svc-tab-count{font-size:22px;font-weight:500;line-height:1.1;}
  .svc-tab-label{font-size:11px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;margin-top:2px;opacity:0.7;}
  /* TIMELINE */
  .tl-scroll{flex:1;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--raised) transparent;}
  .tl-sticky-bar{position:sticky;top:0;z-index:20;background:var(--surface);border-bottom:0.5px solid var(--border);display:flex;height:44px;flex-shrink:0;}
  .tl-sticky-time{width:50px;flex-shrink:0;border-right:0.5px solid var(--border);}
  .tl-sticky-item{position:absolute;top:0;bottom:0;display:flex;flex-direction:column;justify-content:center;padding:0 6px;cursor:pointer;overflow:hidden;transition:background 0.12s;}
  .tl-sticky-item:hover{background:rgba(255,255,255,0.04);}
  .tl-body{display:flex;}
  .tl-times{width:50px;flex-shrink:0;}
  .tl-lbl{height:90px;display:flex;align-items:flex-start;padding:5px 8px 0 0;justify-content:flex-end;font-size:10px;color:var(--mid);font-weight:600;border-top:0.5px solid var(--border);}
  .tl-lbl:first-child{border-top:none;}
  .tl-col{flex:1;position:relative;}
  .tl-inner{position:relative;height:990px;}
  .tl-line{position:absolute;left:0;right:0;height:0.5px;background:var(--border);pointer-events:none;}
  /* BOOKING CARDS */
  .bk{position:absolute;border-radius:6px;padding:5px 7px;cursor:pointer;border-left:3px solid transparent;overflow:hidden;transition:filter 0.12s;z-index:2;}
  .bk:hover{filter:brightness(1.08);z-index:10;}
  .bk-pet{font-size:12px;font-weight:700;color:var(--cream);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center;gap:4px;}
  .bk-sub{font-size:10px;color:var(--cream-m);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .bk-tag{font-size:9px;font-weight:700;margin-top:3px;padding:1px 5px;border-radius:3px;display:inline-block;letter-spacing:0.03em;}
  /* BREAK BLOCKS */
  .bk-break{position:absolute;border-radius:5px;padding:5px 8px;z-index:3;overflow:hidden;}
  .bk-break-block{cursor:pointer;transition:filter 0.12s;}
  .bk-break-block:hover{filter:brightness(1.15);}
  .bk-break-lbl{font-size:10px;font-weight:600;color:var(--cream-m);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .bk-cancelled { opacity:0.4; filter:grayscale(1); }
  .bk-cancelled .bk-pet, .bk-cancelled .bk-sub { text-decoration:line-through; }
  .bk-pending { opacity:0.55; filter:grayscale(0.6); }
  .bk-member-star { position:absolute; top:3px; right:4px; font-size:9px; color:#FFCE58; line-height:1; pointer-events:none; }
  /* STATUS DOTS */
  .sdot{width:6px;height:6px;border-radius:50%;display:inline-block;flex-shrink:0;}
  /* PANEL (Add/Edit Room/Groomer) */
  .panel-overlay{position:fixed;inset:0;background:rgba(10,20,30,0.55);z-index:300;display:none;}
  .panel-overlay.open{display:block;}
  .panel{position:fixed;top:0;right:0;bottom:0;width:360px;background:var(--bg);border-left:0.5px solid var(--border);z-index:301;display:flex;flex-direction:column;transform:translateX(100%);transition:transform 0.28s cubic-bezier(0.4,0,0.2,1);}
  .panel.open{transform:translateX(0);}
  .panel-head{padding:16px;border-bottom:0.5px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
  .panel-title{font-family:"Fredoka One",cursive;font-size:18px;color:var(--cream);}
  .panel-close{background:var(--surface);border:0.5px solid var(--border);border-radius:50%;width:28px;height:28px;cursor:pointer;color:var(--mid);font-size:16px;display:flex;align-items:center;justify-content:center;font-family:"Nunito",sans-serif;}
  .panel-body{flex:1;overflow-y:auto;padding:16px;scrollbar-width:thin;}
  .panel-footer{padding:14px 16px;border-top:0.5px solid var(--border);display:flex;gap:8px;flex-shrink:0;}
  /* FORM ELEMENTS */
  .fg{margin-bottom:14px;}
  .fl{font-size:10px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--mid);margin-bottom:6px;display:block;}
  .fi,.fs{width:100%;background:var(--surface);border:1.5px solid var(--border);border-radius:8px;padding:9px 12px;color:var(--cream);font-family:"Nunito",sans-serif;font-size:13px;outline:none;}
  .fi:focus,.fs:focus{border-color:var(--blue);}
  .fs option{background:var(--surface);}
  .ft{width:100%;background:var(--surface);border:1.5px solid var(--border);border-radius:8px;padding:9px 12px;color:var(--cream);font-family:"Nunito",sans-serif;font-size:13px;outline:none;resize:vertical;min-height:60px;}
  /* COLOR PICKER */
  .color-picker{display:flex;gap:7px;flex-wrap:wrap;}
  .cp-dot{width:26px;height:26px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform 0.12s;}
  .cp-dot.on{border-color:var(--cream);transform:scale(1.1);}
  /* DAYS PICKER */
  .days-picker{display:flex;gap:5px;}
  .day-btn{width:30px;height:30px;border-radius:50%;border:1px solid var(--border);background:transparent;color:var(--mid);font-size:11px;font-weight:700;cursor:pointer;font-family:"Nunito",sans-serif;transition:all 0.12s;}
  .day-btn.on{background:var(--blue);border-color:var(--blue);color:#fff;}
  /* SIZE CHECKS */
  .size-checks{display:flex;gap:6px;flex-wrap:wrap;}
  .sz-btn{font-size:11px;font-weight:600;padding:4px 10px;border-radius:20px;border:0.5px solid var(--border);background:transparent;color:var(--mid);cursor:pointer;font-family:"Nunito",sans-serif;transition:all 0.12s;}
  .sz-btn.on{background:var(--raised);border-color:var(--cream-m);color:var(--cream);}
  /* TOGGLE */
  .toggle-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;}
  .toggle-lbl{font-size:12px;color:var(--cream-m);}
  .toggle{width:40px;height:22px;background:var(--raised);border-radius:11px;position:relative;cursor:pointer;transition:background 0.2s;flex-shrink:0;}
  .toggle.on{background:var(--blue);}
  .toggle::after{content:"";position:absolute;top:3px;left:3px;width:16px;height:16px;border-radius:50%;background:#fff;transition:transform 0.2s;}
  .toggle.on::after{transform:translateX(18px);}
  /* BREAK ROWS */
  /* PANEL BUTTONS */
  .btn-save{flex:1;background:var(--yellow);color:#3d2e00;border:none;border-radius:50px;padding:10px;font-size:13px;font-weight:700;cursor:pointer;font-family:"Nunito",sans-serif;}
  .btn-cancel{flex:0 0 auto;padding:10px 18px;background:transparent;border:0.5px solid var(--border);border-radius:50px;font-size:13px;font-weight:700;color:var(--mid);cursor:pointer;font-family:"Nunito",sans-serif;}
  .btn-delete{flex:0 0 auto;padding:10px 14px;background:transparent;border:0.5px solid rgba(255,107,107,0.4);border-radius:50px;font-size:13px;font-weight:700;color:var(--error);cursor:pointer;font-family:"Nunito",sans-serif;}
  /* DRAWER */
  .dr-overlay{position:fixed;inset:0;background:rgba(10,20,30,0.7);z-index:200;display:none;align-items:flex-end;justify-content:center;}
  .dr-overlay.open{display:flex;}
  .drawer{background:var(--bg);width:100%;max-width:520px;max-height:90svh;border-radius:20px 20px 0 0;overflow-y:auto;padding:18px 18px 28px;animation:slideUp 0.28s ease;}
  @keyframes slideUp{from{transform:translateY(100%);}to{transform:translateY(0);}}
  .dr-handle{width:36px;height:4px;border-radius:2px;background:var(--raised);margin:0 auto 16px;}
  .dr-close{float:right;background:var(--surface);border:0.5px solid var(--border);border-radius:50%;width:28px;height:28px;cursor:pointer;color:var(--mid);font-size:16px;display:flex;align-items:center;justify-content:center;font-family:"Nunito",sans-serif;}
  .dr-ref{font-size:10px;color:var(--mid);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:2px;}
  .dr-name{font-family:"Fredoka One",cursive;font-size:22px;color:var(--cream);margin-bottom:2px;}
  .dr-breed{font-size:13px;color:var(--cream-m);margin-bottom:12px;}
  .dr-status-row{display:flex;align-items:center;gap:8px;margin-bottom:12px;}
  .dr-time{font-size:13px;font-weight:600;color:var(--cream);}
  .dr-status-pill{font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;}
  .dr-pay-pill{font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;}
  .dr-medical{background:rgba(239,159,39,0.1);border-left:3px solid var(--amber);border-radius:0 6px 6px 0;padding:8px 12px;margin-bottom:10px;}
  .dr-medical-lbl{font-size:10px;font-weight:700;letter-spacing:0.07em;text-transform:uppercase;color:var(--amber);margin-bottom:3px;}
  .dr-medical-txt{font-size:12px;color:var(--cream);line-height:1.5;}
  .dr-vacc-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px;}
  .dr-vacc{font-size:11px;font-weight:600;}
  .dr-sec{border-top:0.5px solid var(--border);padding-top:10px;margin-top:10px;}
  .dr-sec-title{font-size:9px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--mid);margin-bottom:8px;}
  .dr-row{display:flex;justify-content:space-between;align-items:flex-start;padding:3px 0;gap:10px;}
  .dr-key{font-size:12px;color:var(--mid);flex-shrink:0;}
  .dr-val{font-size:12px;color:var(--cream);font-weight:500;text-align:right;}
  .dr-pay-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:0.5px solid rgba(77,150,185,0.1);}
  .dr-pay-row:last-child{border-bottom:none;}
  .dr-pay-label{font-size:12px;color:var(--cream-m);}
  .dr-pay-amt{font-size:12px;font-weight:600;color:var(--cream);}
  .dr-pay-meta{font-size:10px;color:var(--mid);margin-top:1px;}
  .dr-ctas{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px;}
  .dr-btn-sec{padding:10px;font-size:12px;font-weight:700;border:0.5px solid var(--border);border-radius:8px;background:transparent;color:var(--cream-m);cursor:pointer;font-family:"Nunito",sans-serif;}
  .dr-btn-pri{padding:10px;font-size:12px;font-weight:700;border:none;border-radius:8px;background:rgba(77,150,185,0.18);color:var(--blue);cursor:pointer;font-family:"Nunito",sans-serif;}
  .dr-btn-pay{width:100%;padding:9px;font-size:12px;font-weight:700;border:0.5px dashed var(--border);border-radius:8px;background:transparent;color:var(--mid);cursor:pointer;font-family:"Nunito",sans-serif;margin-top:8px;text-align:center;}
  .dr-btn-pay:hover{border-color:var(--success);color:var(--success);}
  .status-select{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:8px 12px;color:var(--cream);font-family:"Nunito",sans-serif;font-size:13px;width:100%;outline:none;margin-top:8px;cursor:pointer;}
  .save-btn{width:100%;background:var(--blue);color:#fff;border:none;border-radius:50px;padding:10px;font-size:12px;font-weight:700;cursor:pointer;font-family:"Nunito",sans-serif;margin-top:8px;}



  #bkPanel{width:420px;}
  .bk-st{font-size:10px;font-weight:600;padding:3px 8px;border-radius:20px;border:0.5px solid var(--border);cursor:pointer;white-space:nowrap;color:var(--mid);background:transparent;}
  .bk-st.on{background:rgba(77,150,185,0.15);border-color:var(--blue);color:var(--blue);}
  .bk-st.done{background:rgba(107,203,119,0.15);border-color:var(--success);color:var(--success);}
  .bk-vacc-row{display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:0.5px solid var(--border);}
  .bk-vacc-row:last-child{border-bottom:none;}
  .bk-yn{display:flex;gap:5px;}
  .bk-yn-btn{font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;border:0.5px solid var(--border);cursor:pointer;background:transparent;color:var(--mid);font-family:"Nunito",sans-serif;}
  .bk-yn-btn.bk-y{background:rgba(107,203,119,0.18);border-color:var(--success);color:var(--success);}
  .bk-yn-btn.bk-n{background:rgba(255,107,107,0.18);border-color:var(--error);color:var(--error);}
  .bk-pill{font-size:11px;padding:4px 10px;border-radius:20px;border:0.5px solid var(--border);cursor:pointer;color:var(--mid);background:transparent;white-space:nowrap;}
  .bk-pill.on{background:var(--raised);border-color:var(--cream-m);color:var(--cream);}
  .bk-acard{border:0.5px solid var(--border);border-radius:7px;padding:7px 9px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;gap:6px;}
  .bk-acard.on{border-color:var(--blue);background:rgba(77,150,185,0.08);}
  .bk-acard.dis{opacity:0.35;cursor:not-allowed;}
  .bk-an{font-size:12px;color:var(--cream-m);}
  .bk-ap{font-size:11px;color:var(--mid);white-space:nowrap;}
  .bk-acard.on .bk-an{color:var(--cream);}
  .bk-acard.on .bk-ap{color:var(--blue);}
  .bk-agrid{display:grid;grid-template-columns:1fr 1fr;gap:5px;}
  .bk-slot{font-size:11px;padding:4px 9px;border-radius:6px;border:0.5px solid var(--border);cursor:pointer;color:var(--mid);background:transparent;}
  .bk-slot.on{background:rgba(77,150,185,0.15);border-color:var(--blue);color:var(--blue);}
  .bk-slot-grid{display:flex;flex-wrap:wrap;gap:5px;}
  .bk-svc-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
  .bk-svc-card{border:0.5px solid var(--border);border-radius:8px;padding:8px 10px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;}
  .bk-svc-card.on{border-color:var(--blue);background:rgba(77,150,185,0.08);}
  .bk-sum-row{display:flex;justify-content:space-between;padding:4px 0;font-size:12px;color:var(--cream-m);}
  .bk-sum-val{font-size:12px;color:var(--cream);font-weight:500;text-align:right;}
  .bk-total{display:flex;justify-content:space-between;padding:10px 0 0;border-top:0.5px solid var(--border);font-size:14px;font-weight:500;color:var(--cream);}
  .bk-disc{color:var(--success);font-size:12px;}
  .bk-warn{background:rgba(239,159,39,0.1);border-radius:7px;padding:7px 10px;font-size:11px;color:var(--amber);margin-top:5px;}
  .bk-ibox{background:var(--surface);border-radius:7px;padding:8px 11px;font-size:12px;color:var(--mid);line-height:1.5;margin-bottom:10px;}


  .skeleton{background:linear-gradient(90deg,var(--surface) 25%,var(--raised) 50%,var(--surface) 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:6px;}

  @media(max-width:640px){
    .topbar{grid-template-columns:1fr auto !important;gap:4px;}
    .topbar > div:first-child{display:none !important;}
    .date-label{min-width:60px;font-size:11px;}
    #refreshBtn span + *{display:none;}
    /* Collapse sidebar on mobile; expanding compresses the main content */
    .sidebar{width:40px;flex-shrink:0;z-index:30;}
    .sidebar.mobile-open{width:200px;}
    .body{overflow-x:hidden;}
    /* Booking drawer full-width on mobile */
    .drawer{max-width:100%;border-radius:16px 16px 0 0;padding:14px 14px 80px;max-height:92svh;}
    /* All right-side panels full-screen on mobile */
    .panel{
      width:100vw !important;max-width:100vw !important;right:0 !important;left:0 !important;
      border-radius:0 !important;top:0 !important;bottom:0 !important;height:100% !important;
    }
    /* Timeline scroll area fills width */
    .tl-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;}
    .svc-tab{padding:8px 12px;}
    .svc-tab-count{font-size:18px;}
    /* FAB position above mobile nav */
    .fab-group{bottom:72px;right:16px;}
    /* Ensure overlays cover full screen */
    .panel-overlay{position:fixed;inset:0;}
    /* Mobile bottom nav bar */
    .mobile-nav-bar{display:flex;}
    /* Page bottom padding so content doesn't hide behind nav bar */
    #pageCalendar,#pageBookings,#pageCheckIn,#pageMembers{padding-bottom:60px;}
  }
  @media(min-width:641px){
    .mobile-nav-bar{display:none !important;}
  }
  @media(min-width:641px) and (max-width:820px){
    .topbar > div:first-child span:first-child{font-size:11px;}
    .topbar > div:first-child button{font-size:10px;}
    .date-label{min-width:100px;font-size:12px;}
    .sidebar{width:168px;}
  }
  /* Mobile nav bar styles */
  .mobile-nav-bar{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:0.5px solid var(--border);z-index:100;height:56px;align-items:stretch;}
  .mnb-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;background:transparent;border:none;cursor:pointer;font-family:Nunito,sans-serif;color:var(--mid);font-size:9px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;padding:6px 4px;transition:color 0.15s;}
  .mnb-btn.on{color:var(--yellow);}
  .mnb-icon{font-size:18px;line-height:1;}
  .mnb-branch{display:flex;align-items:center;gap:4px;padding:0 12px;border-left:0.5px solid var(--border);}
  .mnb-br-btn{font-size:10px;font-weight:700;padding:4px 8px;border-radius:14px;border:0.5px solid var(--border);background:transparent;color:var(--mid);cursor:pointer;font-family:Nunito,sans-serif;white-space:nowrap;}
  .mnb-br-btn.on{background:var(--yellow);border-color:var(--yellow);color:#3d2e00;}

  @keyframes spin{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
  @keyframes shimmer{0%{background-position:200% 0;}100%{background-position:-200% 0;}}
  .sk-card{height:80px;margin:6px 10px 0;border-radius:8px;}
  .sk-card-tall{height:160px;margin:6px 10px 0;border-radius:8px;}

  .yn-btn{font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;border:0.5px solid var(--border);background:transparent;color:var(--mid);cursor:pointer;font-family:"Nunito",sans-serif;}
  .yn-on-y{background:rgba(107,203,119,0.18);border-color:var(--success);color:var(--success);}
  .yn-on-n{background:rgba(255,107,107,0.18);border-color:var(--error);color:var(--error);}


  /* ── MONTH CALENDAR OVERLAY ── */
  .cal-overlay{position:fixed;inset:0;background:rgba(10,20,30,0.72);z-index:400;display:none;align-items:center;justify-content:center;}
  .cal-overlay.open{display:flex;}
  .cal-modal{background:var(--bg);border:0.5px solid var(--border);border-radius:18px;padding:20px;width:320px;animation:fadeIn 0.2s ease;}
  @keyframes fadeIn{from{opacity:0;transform:scale(0.96);}to{opacity:1;transform:scale(1);}}
  .cal-modal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
  .cal-modal-month{font-family:"Fredoka One",cursive;font-size:18px;color:var(--cream);}
  .cal-modal-nav{display:flex;gap:6px;}
  .cal-modal-nav button{width:28px;height:28px;border-radius:6px;border:0.5px solid var(--border);background:transparent;cursor:pointer;color:var(--mid);font-family:"Nunito",sans-serif;font-size:13px;}
  .cal-modal-close{font-size:16px;color:var(--mid);background:transparent;border:none;cursor:pointer;font-family:"Nunito",sans-serif;margin-left:8px;}
  .cal-dow-row{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:4px;}
  .cal-dow-cell{font-size:10px;font-weight:700;color:var(--mid);text-align:center;padding-bottom:4px;}
  .cal-days-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
  .cal-day-cell{height:38px;border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:background 0.12s;position:relative;}
  .cal-day-cell:hover{background:var(--raised);}
  .cal-day-cell.other{opacity:0.3;}
  .cal-day-cell.is-today{background:var(--yellow);}
  .cal-day-cell.is-today .cal-day-num{color:#3d2e00;font-weight:700;}
  .cal-day-cell.is-selected:not(.is-today){background:var(--raised);outline:1.5px solid var(--blue);}
  .cal-day-num{font-size:13px;color:var(--cream-m);}
  .cal-day-dot{width:4px;height:4px;border-radius:50%;background:var(--blue);margin-top:1px;}
  .cal-day-cell.is-today .cal-day-dot{background:#3d2e00;}

  /* ── CURRENT TIME INDICATOR ── */
  .time-now-line{position:absolute;left:0;right:0;height:2px;background:#FF6B6B;z-index:20;pointer-events:none;}
  .time-now-dot{position:absolute;left:-4px;top:-4px;width:10px;height:10px;border-radius:50%;background:#FF6B6B;}

  /* ── ROTATED NARROW CARD ── */
  .bk-name-rotated{writing-mode:vertical-rl;text-orientation:mixed;transform:rotate(180deg);font-size:11px;font-weight:700;color:var(--cream);white-space:nowrap;overflow:hidden;max-height:100%;text-overflow:ellipsis;line-height:1.2;}

  /* ── ADMIN PAGE NAV ── */
  .admin-nav{display:grid;grid-template-columns:1fr 1fr;border-bottom:0.5px solid var(--border);background:var(--surface);}
  .anav-btn{padding:8px 4px;border:none;border-right:0.5px solid var(--border);border-bottom:0.5px solid var(--border);background:transparent;color:var(--mid);cursor:pointer;font-family:"Nunito",sans-serif;font-size:10px;font-weight:700;display:flex;flex-direction:column;align-items:center;gap:2px;transition:color 0.15s,background 0.15s;}
  .anav-btn:nth-child(2n){border-right:none;}
  .anav-btn:nth-child(3),.anav-btn:nth-child(4){border-bottom:none;}
  .anav-btn span{font-size:9px;letter-spacing:0.05em;text-transform:uppercase;}
  .anav-btn.on{color:var(--yellow);background:var(--raised);}
  .anav-btn:hover:not(.on){color:var(--cream);background:var(--raised);}

  /* ── BOOKINGS LIST ── */
  .bklist-row:hover{background:var(--raised);}
  .bklist-row.bk-cancelled{opacity:0.45;filter:grayscale(1);}
  /* ── CHECK-IN CARDS ── */
  .ci-card:hover{background:var(--raised) !important;}

  /* ── TIME SLOT BUTTONS (grooming schedule) ── */
  .time-slot-btn{padding:6px 10px;border-radius:6px;border:0.5px solid var(--border);background:var(--surface);color:var(--cream);cursor:pointer;font-size:12px;font-family:"Nunito",sans-serif;font-weight:600;transition:all 0.12s;}
  .time-slot-btn:hover:not(.taken){border-color:var(--blue);color:var(--blue);}
  .time-slot-btn.on{background:var(--yellow);border-color:var(--yellow);color:#3d2e00;}
  .time-slot-btn.taken{opacity:0.35;cursor:not-allowed;text-decoration:line-through;}

</style>
</head>
<body>

<!-- GATE -->
<div id="gate">
  <div class="gate-card">
    <p class="gate-logo"><img src="images/Barkhaus Pet Hotel Logo.png" alt="Barkhaus Pet Hotel Logo" style="height:48px;width:auto;display:inline-block;vertical-align:middle;"></p>
    <p class="gate-sub">Admin access only</p>
    <button class="gate-btn" id="gateBtn" onclick="signInWithGoogle()" style="display:flex;align-items:center;justify-content:center;gap:10px;background:#fff;color:#3c4043;font-family:'Nunito',sans-serif;font-size:14px;font-weight:500;border:1px solid #dadce0;border-radius:4px;padding:10px 24px;cursor:pointer;width:100%;letter-spacing:normal;text-transform:none">
      <svg width="18" height="18" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg">
        <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/>
        <path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="#34A853"/>
        <path d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/>
        <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 6.29C4.672 4.163 6.656 3.58 9 3.58z" fill="#EA4335"/>
      </svg>
      Sign in with Google
    </button>
    <p class="gate-error" id="gateError"></p>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="topbar" style="display:grid;grid-template-columns:1fr auto 1fr;align-items:center;padding:0 16px;height:48px;">
    <!-- Left: user info -->
    <div style="display:flex;flex-direction:column;justify-content:center;gap:2px">
      <span id="adminGreeting" style="font-size:13px;font-weight:700;color:var(--cream)">Hi, Admin</span>
      <button style="font-size:11px;color:var(--mid);background:transparent;border:none;padding:0;cursor:pointer;font-family:Nunito,sans-serif;text-align:left;width:fit-content" onclick="signOut()">Sign out</button>
    </div>
    <!-- Center: logo -->
    <span class="topbar-logo" style="text-align:center"><img src="images/Barkhaus Pet Hotel Logo.png" alt="Barkhaus Pet Hotel Logo" style="height:20px;width:auto;display:inline-block;vertical-align:middle;"></span>
    <!-- Right: date nav + refresh -->
    <div style="display:flex;align-items:center;gap:6px;justify-content:flex-end">
      <button class="dnb" onclick="shiftDate(-1)">&#8592;</button>
      <span class="date-label" id="dateLabel" onclick="openCalOverlay()" style="cursor:pointer;text-decoration:underline dotted rgba(184,212,224,0.4)" title="Open calendar"></span>
      <button class="dnb" onclick="shiftDate(1)">&#8594;</button>
      <button class="today-btn" onclick="goToday()">Today</button>
      <button id="refreshBtn" onclick="refreshNow()" style="font-size:11px;color:var(--mid);background:transparent;border:0.5px solid var(--border);border-radius:20px;padding:4px 10px;cursor:pointer;font-family:Nunito,sans-serif;display:flex;align-items:center;gap:4px"><span id="refreshIcon">&#8635;</span> Refresh</button>
    </div>
  </div>
  <div class="body">
    <aside class="sidebar" id="sidebar">
      <!-- Sticky top: toggle + nav + branch tabs -->
      <div class="sb-sticky-top" id="sbStickyTop">
        <div style="display:flex;align-items:center;justify-content:flex-end;padding:6px 8px;border-bottom:0.5px solid var(--border)">
          <button class="sb-toggle" onclick="toggleSidebar()" id="sbToggle" title="Toggle sidebar"><svg width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="1" y="1" width="12" height="12" rx="2" stroke="currentColor" stroke-width="1.2"/><line x1="5" y1="1" x2="5" y2="13" stroke="currentColor" stroke-width="1.2"/></svg></button>
        </div>
        <div class="admin-nav" id="adminNav">
          <button class="anav-btn on" onclick="switchAdminPage('calendar')" data-page="calendar">📅<span>Calendar</span></button>
          <button class="anav-btn" onclick="switchAdminPage('bookings')" data-page="bookings">📋<span>Bookings</span></button>
          <button class="anav-btn" onclick="switchAdminPage('checkin')" data-page="checkin">🐾<span>Check In</span></button>
          <button class="anav-btn" onclick="switchAdminPage('members')" data-page="members">👤<span>Members</span></button>
        </div>
        <div class="branch-tabs">
          <button class="br-tab on" onclick="setBranch(0,this)">Estancia</button>
          <button class="br-tab" onclick="setBranch(1,this)">Eastwood</button>
        </div>
      </div>
      <div class="sb-scroll" id="sbScroll">
      <!-- Bookings page sidebar context -->
      <div id="sbBookContext" style="display:none">
        <div class="sb-sec">
          <div class="sb-sec-hd"><span class="sb-sec-title">Service type</span></div>
          <div style="display:flex;flex-direction:column;gap:2px">
            <button class="bk-svc-filter-btn on" data-svc="all"      onclick="setBkListSvcFilter('all')"      style="text-align:left;padding:5px 7px;border-radius:7px;border:none;background:transparent;font-size:12px;color:var(--cream-m);cursor:pointer;font-family:Nunito,sans-serif;width:100%">All services</button>
            <button class="bk-svc-filter-btn" data-svc="grooming"   onclick="setBkListSvcFilter('grooming')" style="text-align:left;padding:5px 7px;border-radius:7px;border:none;background:transparent;font-size:12px;color:var(--cream-m);cursor:pointer;font-family:Nunito,sans-serif;width:100%">Grooming</button>
            <button class="bk-svc-filter-btn" data-svc="hotel"      onclick="setBkListSvcFilter('hotel')"    style="text-align:left;padding:5px 7px;border-radius:7px;border:none;background:transparent;font-size:12px;color:var(--cream-m);cursor:pointer;font-family:Nunito,sans-serif;width:100%">Pet Hotel</button>
            <button class="bk-svc-filter-btn" data-svc="daycare"    onclick="setBkListSvcFilter('daycare')"  style="text-align:left;padding:5px 7px;border-radius:7px;border:none;background:transparent;font-size:12px;color:var(--cream-m);cursor:pointer;font-family:Nunito,sans-serif;width:100%">Daycare</button>
            <button class="bk-svc-filter-btn" data-svc="studio"     onclick="setBkListSvcFilter('studio')"   style="text-align:left;padding:5px 7px;border-radius:7px;border:none;background:transparent;font-size:12px;color:var(--cream-m);cursor:pointer;font-family:Nunito,sans-serif;width:100%">Studio</button>
          </div>
        </div>
      </div>
      <!-- Check In page sidebar context -->
      <div id="sbCheckInContext" style="display:none">
        <div class="sb-sec">
          <div class="sb-sec-hd"><span class="sb-sec-title">Today's actions</span></div>
          <p style="font-size:11px;color:var(--mid);padding:4px 7px 8px;line-height:1.5">Bookings that need a status update today.</p>
        </div>
      </div>
      <div id="sbCalContext">
      <div class="sb-sec">
        <div class="sb-sec-hd">
          <span class="sb-sec-title">Hotel rooms</span>
        </div>
        <div id="roomList"></div>
        <button class="sb-add-btn" onclick="openRoomPanel(null)">+ Add room</button>
      </div>
      <div class="sb-div"></div>
      <div class="sb-sec">
        <div class="sb-sec-hd">
          <span class="sb-sec-title">Groomers</span>
        </div>
        <div id="groomerList"></div>
        <button class="sb-add-btn" onclick="openGroomerPanel(null)">+ Add groomer</button>
      </div>
      <div class="sb-div" id="studioSidebarDiv"></div>
      <div class="sb-sec" id="studioSidebarSec">
        <div class="sb-sec-hd">
          <span class="sb-sec-title">Studio units</span>
        </div>
        <div id="studioList"></div>
        <button class="sb-add-btn" onclick="openStudioPanel(null)">+ Add studio</button>
      </div>
      </div><!-- /sbCalContext -->
      </div><!-- /sb-scroll -->
    </aside>
    <div class="main-content" id="pageCalendar">
      <div class="svc-tabs" id="svcTabs"></div>
      <div class="tl-scroll" id="tlScroll">
        <div id="tlStickyBar" class="tl-sticky-bar" style="display:none">
          <div class="tl-sticky-time"></div>
          <div id="tlStickyCards" style="flex:1;position:relative"></div>
        </div>
        <div class="tl-body">
          <div class="tl-times" id="tlTimes"></div>
          <div class="tl-col"><div class="tl-inner" id="tlInner"></div></div>
        </div>
      </div>
    </div>
    <div id="pageBookings" style="display:none;flex:1;overflow-y:auto;padding:16px;"></div>
    <div id="pageCheckIn" style="display:none;flex:1;overflow-y:auto;padding:16px;"></div>
    <div id="pageMembers" style="display:none;flex:1;overflow-y:auto;padding:24px;"></div>
  </div>
</div>

<!-- MOBILE BOTTOM NAV -->
<div class="mobile-nav-bar" id="mobileNavBar">
  <button class="mnb-btn on" onclick="mobileSwitchPage('calendar',this)" data-page="calendar"><span class="mnb-icon">📅</span>Calendar</button>
  <button class="mnb-btn" onclick="mobileSwitchPage('bookings',this)" data-page="bookings"><span class="mnb-icon">📋</span>Bookings</button>
  <button class="mnb-btn" onclick="mobileSwitchPage('checkin',this)" data-page="checkin"><span class="mnb-icon">🐾</span>Check In</button>
  <button class="mnb-btn" onclick="mobileSwitchPage('members',this)" data-page="members"><span class="mnb-icon">👤</span>Members</button>
  <div class="mnb-branch">
    <button class="mnb-br-btn on" onclick="setMobileBranch(0,this)">Est.</button>
    <button class="mnb-br-btn" onclick="setMobileBranch(1,this)">EW</button>
  </div>
</div>

<!-- MONTH CALENDAR OVERLAY -->
<div class="cal-overlay" id="calOverlay" onclick="closeCalOverlay(event)">
  <div class="cal-modal">
    <div class="cal-modal-head">
      <span class="cal-modal-month" id="calModalMonth"></span>
      <div style="display:flex;align-items:center;gap:4px">
        <div class="cal-modal-nav">
          <button onclick="shiftCalModal(-1)">&#8592;</button>
          <button onclick="shiftCalModal(1)">&#8594;</button>
        </div>
        <button class="cal-modal-close" onclick="closeCalOverlay()">&#215;</button>
      </div>
    </div>
    <div class="cal-dow-row" id="calDowRow"></div>
    <div class="cal-days-grid" id="calDaysGrid"></div>
  </div>
</div>

<div class="fab-group" id="fabGroup">
  <div class="fab-actions" id="fabActions" style="display:none">
    <button class="fab-action" onclick="openBookingPanel(null,'admin')">📋 Add Booking</button>
    <button class="fab-action" onclick="openWalkinBooking()">🚶 Walk-in</button>
    <button class="fab-action" onclick="openBlockPanel(null)">🚫 Block Schedule</button>
  </div>
  <button class="fab-main" id="fabMain" onclick="toggleFab()">+</button>
</div>


<!-- BOOKING PANEL -->
<div class="panel-overlay" id="bkOverlay" onclick="closeBkPanel(event)"></div>
<div class="panel" id="bkPanel" style="width:420px">
  <div class="panel-head" style="flex-direction:column;align-items:stretch;gap:8px;padding-bottom:10px">
    <div style="display:flex;align-items:center;justify-content:space-between">
      <span class="panel-title" id="bkPanelTitle">Add booking</span>

/* ── SUPABASE ── */
async function sb(path, params) {
  var url = SUPABASE_URL+'/rest/v1/'+path+(params?'?'+params:'');
  var res = await fetch(url, {headers: await getAuthHeaders()});
  if (!res.ok) { var t=await res.text(); throw new Error(res.status+': '+t); }
  return res.json();
}
async function sbPost(path, body) {
  var hdrs = await getAuthHeaders();
  hdrs['Prefer'] = 'return=representation';
  var res = await fetch(SUPABASE_URL+'/rest/v1/'+path, {method:'POST',headers:hdrs,body:JSON.stringify(body)});
  if (!res.ok) { var t=await res.text(); throw new Error(res.status+': '+t); }
  return res.json();
}
async function sbPatch(path, params, body) {
  var hdrs = await getAuthHeaders();
  hdrs['Prefer'] = 'return=representation';
  var res = await fetch(SUPABASE_URL+'/rest/v1/'+path+'?'+params, {method:'PATCH',headers:hdrs,body:JSON.stringify(body)});
  if (!res.ok) { var t=await res.text(); throw new Error(res.status+': '+t); }
  var data = await res.json();
  if (Array.isArray(data) && data.length === 0) {
    console.warn('[sbPatch] 0 rows updated —', path, params, body);
    throw new Error('Update blocked — no rows matched or RLS policy denied the write. Check Supabase RLS policies for the \'' + path + '\' table.');
  }
  return data;
}
async function sbDelete(path, params) {
  var res = await fetch(SUPABASE_URL+'/rest/v1/'+path+'?'+params, {method:'DELETE',headers: await getAuthHeaders()});
  return res.ok;
}

async function openWalkinBooking() {
  try {
    // Generate UUID client-side — avoids needing Prefer:return=representation
    // and the SELECT-back that follows it
    var token = (crypto.randomUUID ? crypto.randomUUID() :
      'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
        var r = Math.random() * 16 | 0;
        return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16);
      }));
    var hdrs = await getAuthHeaders();
    var res = await fetch(SUPABASE_URL + '/rest/v1/walkin_tokens', {
      method: 'POST',
      headers: Object.assign({}, hdrs, { 'Prefer': 'return=minimal' }),
      body: JSON.stringify({ id: token })
    });
    if (!res.ok) { var t = await res.text(); throw new Error(res.status + ': ' + t); }
    window.open('booking.html?walkin=1&token=' + encodeURIComponent(token), '_blank');
  } catch(e) {
    alert('Could not open walk-in booking: ' + e.message);
  }
}

      if (activeFilter.type==='studio')  { var _sd=Array.isArray(b.studio_details)?(b.studio_details[0]||{}):(b.studio_details||{}); return b.service==='studio' && _sd.studio_id===activeFilter.id; }
    }
    return true;
  });

  var gridHtml='';
  for(var h=0;h<=11;h++) gridHtml+='<div class="tl-line" style="top:'+(h*90)+'px"></div>';

  var breakHtml='';

  // Render blocked_schedules for the current view date
  var todayStr = fmtDate(currentDate);
  blockedSchedules.forEach(function(bl) {
    // Date match — support both JS array and PostgreSQL literal string
    var blDates = Array.isArray(bl.dates) ? bl.dates : (bl.dates ? String(bl.dates).replace(/[{}"]/g,'').split(',') : []);
    if (!blDates.length || blDates.indexOf(todayStr) === -1) return;
    // Service type match
    if (currentSvc==='grooming' && bl.resource_type!=='groomer') return;
    if (currentSvc==='hotel'    && bl.resource_type!=='room')    return;
    if (currentSvc==='studio'   && bl.resource_type!=='studio')  return;
    // 'all' shows room, groomer and studio blocks; skip daycare
    if (currentSvc!=='grooming' && currentSvc!=='hotel' && currentSvc!=='studio' && currentSvc!=='all') return;
    // When a specific resource is selected, only show that resource's blocks
    if (activeFilter && activeFilter.id && bl.resource_id !== activeFilter.id) return;
    var stMin = parseMins(bl.start_time);
    var enMin = parseMins(bl.end_time);
    if (stMin===null || enMin===null || stMin >= enMin) return;
    var top = Math.max(0, (stMin - DAY_START) * PX_PER_MIN);
    var ht  = Math.max(22, (enMin - stMin) * PX_PER_MIN);
    var label = bl.reason || 'Blocked';
    // Resolve inventory color and name
    var resPool = bl.resource_type==='groomer' ? groomers : (bl.resource_type==='studio' ? studios : rooms);
    var resObj = resPool.find(function(r){return r.id===bl.resource_id;});
    var blockColor = (resObj && resObj.color) ? resObj.color : '#9B95E8';
    var resourceName = resObj ? resObj.name : '';
    // Parse hex to rgba for the stripe fill
    var rc=parseInt(blockColor.slice(1,3),16), gc=parseInt(blockColor.slice(3,5),16), bc2=parseInt(blockColor.slice(5,7),16);
    var innerHtml = '<div style="font-size:11px;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">🚫 '+(resourceName?e(resourceName)+' — ':'')+e(label)+'</div>';
    if (ht >= 44) innerHtml += '<div style="font-size:10px;color:rgba(255,255,255,0.65);margin-top:2px">Blocked</div>';
    breakHtml += '<div class="bk-break bk-break-block" onclick="openBlockDrawer(\''+bl.id+'\')" style="top:'+top+'px;height:'+ht+'px;left:2px;right:2px;'+
      'background:repeating-linear-gradient(135deg,rgba('+rc+','+gc+','+bc2+',0.55) 0px,rgba('+rc+','+gc+','+bc2+',0.55) 6px,rgba('+rc+','+gc+','+bc2+',0.3) 6px,rgba('+rc+','+gc+','+bc2+',0.3) 12px);'+
      'border:1.5px solid '+blockColor+';border-left:4px solid '+blockColor+';border-radius:5px">'+innerHtml+'</div>';
  });

  var positioned = layoutBks(filtered);
  var cardsHtml = positioned.map(function(item){ return renderCard(item); }).join('');
  document.getElementById('tlInner').innerHTML = gridHtml + breakHtml + cardsHtml;

  // Sticky header bar — one label per booking, aligned to the same column positions as the cards
  var stickyBar   = document.getElementById('tlStickyBar');
  var stickyCards = document.getElementById('tlStickyCards');
  if (stickyBar && stickyCards) {
    if (!positioned.length) {
      stickyBar.style.display = 'none';
    } else {
      stickyBar.style.display = 'flex';
      stickyCards.innerHTML = positioned.map(function(item) {
        var b   = item.b, pet = first(b.pets)||{};
        var gd  = first(b.grooming_details)||null;
        var hd  = first(b.hotel_details)||null;
        var w   = (100/item.total - 0.8)+'%';
        var l   = (item.col/item.total*100 + 0.4)+'%';
        var detailLine = '';
        if (gd)                             detailLine = gd.groom_service_name||'Groom';
        else if (hd)                        detailLine = ROOM_TYPES[hd.room_type]||hd.room_type||'Hotel';
        else if (first(b.daycare_details))  detailLine = 'Daycare';
        else if (first(b.studio_details))   detailLine = 'Studio';
        var color = '#6AAEC8';
        if      (b.service==='hotel'&&hd&&hd.room_id)    { var _r=rooms.find(function(x){return x.id===hd.room_id;}); if(_r) color=_r.color; }
        else if (b.service==='hotel'&&hd&&hd.room_type)  { var _rc={large_cage:'#EF9F27',medium_cage:'#4D96B9',small_cage:'#1D9E75',single_cabin:'#D4537E',villa:'#9B95E8'}; color=_rc[hd.room_type]||color; }
        else if (b.service==='grooming'&&gd&&gd.groomer_id) { var _g=groomers.find(function(x){return x.id===gd.groomer_id;}); if(_g) color=_g.color; }
        else if (b.service==='daycare') color='#1D9E75';
        else if (b.service==='studio')  color='#D4537E';
        var sdot  = '<span class="sdot" style="background:'+(STATUS_COLORS[b.status]||'#888')+'"></span>';
        var emo   = '<span style="font-size:11px">'+(pet.animal_type==='cat'?'&#128049;':'&#128054;')+'</span>';
        var faded = (b.status==='cancelled'||b.status==='rejected') ? 'opacity:0.4;' : (b.status==='pending' ? 'opacity:0.65;' : '');
        return '<div class="tl-sticky-item" style="left:'+l+';width:'+w+';border-left:3px solid '+color+';'+faded+'" onclick="openDrawer(\''+b.id+'\')">'+
          '<div style="font-size:11px;font-weight:700;color:var(--cream);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center;gap:3px">'+sdot+emo+e(pet.name||'Pet')+'</div>'+
          (detailLine ? '<div style="font-size:10px;color:var(--mid);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px">'+e(detailLine)+'</div>' : '')+
          '</div>';
      }).join('');
    }
  }

  renderTimeNowLine();
}

function parseMins(s) {
  if (!s) return null;
  var m = s.match(/(\d+):(\d+)\s*(AM|PM)?/i);
  if (!m) return null;
  var h=parseInt(m[1]),min=parseInt(m[2]),ap=m[3]?m[3].toUpperCase():null;
  if (ap==='PM'&&h!==12) h+=12;
  if (ap==='AM'&&h===12) h=0;
  return h*60+min;
}

function getBookingTimes(b) {
  var svc=b.service, st=null, en=null;
  if (svc==='grooming'){var gd=first(b.grooming_details)||{}; st=parseMins(gd.timeslot); en=st?st+(GROOM_DURATIONS[gd.groom_service_key||'basic']||60):null;}
  else if (svc==='hotel'){var hd=first(b.hotel_details)||{},ds=fmtDate(currentDate),cin=hd.checkin_date,cout=hd.checkout_date; if(cin===ds){st=parseMins(hd.dropoff_time)||DAY_START;en=20*60;}else if(cout===ds){st=DAY_START;en=parseMins(hd.pickup_time)||20*60;}else{st=DAY_START;en=20*60;}}
  else if (svc==='daycare'){var dd=first(b.daycare_details)||{}; st=parseMins(dd.dropoff_time)||DAY_START; en=dd.open_time?20*60:(parseMins(dd.pickup_time)||20*60);}
  else if (svc==='studio'){var sd=first(b.studio_details)||{}; st=parseMins(sd.timeslot); en=st?st+60:null;}
  return {st:st||DAY_START, en:en||Math.min((st||DAY_START)+60,20*60)};
}

function layoutBks(bookings) {
  var items = bookings.map(function(b){ var t=getBookingTimes(b); return {b:b,st:t.st,en:t.en,col:0,total:1}; }).sort(function(a,c){return a.st-c.st;});
  var cols=[];
  items.forEach(function(item){
    var placed=false;
    for(var c=0;c<cols.length;c++){var last=cols[c][cols[c].length-1];if(last.en<=item.st){cols[c].push(item);item.col=c;placed=true;break;}}
    if(!placed){item.col=cols.length;cols.push([item]);}
  });
  var total=Math.max(1,cols.length);
  items.forEach(function(item){
    var conc=1;
    cols.forEach(function(col){col.forEach(function(o){if(o.st<item.en&&o.en>item.st)conc=Math.max(conc,o.col+1);});});
    item.total=conc;
  });
  return items;
}

function renderCard(item) {
  var b=item.b, pet=first(b.pets)||{}, gd=first(b.grooming_details)||null, hd=first(b.hotel_details)||null;
  var top=(item.st-DAY_START)*PX_PER_MIN;
  var ht=Math.max(38,(item.en-item.st)*PX_PER_MIN);
  var w=(100/item.total-0.8)+'%';
  var l=(item.col/item.total*100+0.4)+'%';

  var color='#6AAEC8', bg='rgba(106,174,200,0.12)';
  if (b.service==='hotel'&&hd&&hd.room_id) { var r=rooms.find(function(x){return x.id===hd.room_id;}); if(r){color=r.color;bg=hexBg(r.color);} }
  else if (b.service==='hotel'&&hd&&hd.room_type) { var rc={large_cage:'#EF9F27',medium_cage:'#4D96B9',small_cage:'#1D9E75',single_cabin:'#D4537E',villa:'#9B95E8'}; color=rc[hd.room_type]||color; bg=hexBg(color); }
  else if (b.service==='grooming'&&gd&&gd.groomer_id) { var g=groomers.find(function(x){return x.id===gd.groomer_id;}); if(g){color=g.color;bg=hexBg(g.color);} }
  else if (b.service==='daycare') { color='#1D9E75'; bg=hexBg(color); }
  else if (b.service==='studio')  { color='#D4537E'; bg=hexBg(color); }

  var sdot='<span class="sdot" style="background:'+(STATUS_COLORS[b.status]||'#888')+'"></span>';
  var detailLine = '';
  if (gd) detailLine = (gd.groom_service_name||'Groom')+(gd.preferred_stylist&&gd.preferred_stylist!=='any'?' | '+gd.preferred_stylist:'');
  else if (hd) detailLine = (ROOM_TYPES[hd.room_type]||hd.room_type||'Hotel');
  else if (first(b.daycare_details)) detailLine = 'Daycare';
  else if (first(b.studio_details))  detailLine = 'Studio';
  var ownerName = first(b.owners) ? (first(b.owners).first_name||'') : '';
  // Detect narrow cards - estimate pixel width
  var tlEl = document.getElementById('tlInner');
  var colW  = tlEl ? (tlEl.offsetWidth || 300) : 300;
  var cardPx = colW / Math.max(item.total, 1);
  var isNarrow = cardPx < 70;
  var cancelClass = (b.status==='cancelled'||b.status==='rejected') ? ' bk-cancelled' : (b.status==='pending' ? ' bk-pending' : '');
  var memberStar = b.discount_amount > 0 ? '<span class="bk-member-star">&#9733;</span>' : '';
  if (isNarrow) {
    return '<div class="bk'+cancelClass+'" style="top:'+top+'px;height:'+ht+'px;left:'+l+';width:'+w+';background:'+bg+';border-left-color:'+color+';display:flex;align-items:center;justify-content:center;padding:3px 2px" onclick="openDrawer(\''+b.id+'\')">' +
      '<div class="bk-name-rotated">'+sdot+' '+e(pet.name||'Pet')+'</div></div>';
  }
  return '<div class="bk'+cancelClass+'" style="top:'+top+'px;height:'+ht+'px;left:'+l+';width:'+w+';background:'+bg+';border-left-color:'+color+'" onclick="openDrawer(\''+b.id+'\')">'+
    '<div class="bk-pet">'+sdot+'<span style="font-size:12px">'+(pet.animal_type==='cat'?'&#128049;':'&#128054;')+'</span>'+e(pet.name||'Pet')+'</div>'+
    (ht>52?'<div class="bk-sub">'+e(detailLine)+'</div>':'')+(ht>72?'<div class="bk-sub">'+e(ownerName)+'</div>':'')+memberStar+'</div>';
}

function hexBg(hex) {
  var r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),bl=parseInt(hex.slice(5,7),16);
  return 'rgba('+r+','+g+','+bl+',0.14)';
}
function first(v) { return Array.isArray(v) ? (v[0] || null) : (v || null); }

  html += '<div class="dr-sec"><p class="dr-sec-title">Block Details</p>';
  html += '<div class="dr-row"><span class="dr-key">Time</span><span class="dr-val">'+e((bl.start_time||'').slice(0,5))+' – '+e((bl.end_time||'').slice(0,5))+'</span></div>';
  if (bl.reason) html += '<div class="dr-row"><span class="dr-key">Reason</span><span class="dr-val">'+e(bl.reason)+'</span></div>';
  html += '</div>';
  // Dates section
  html += '<div class="dr-sec"><p class="dr-sec-title">Blocked Dates ('+dates.length+')</p>';

  html += '<button class="dr-btn-pri" onclick="document.getElementById(\'drOverlay\').classList.remove(\'open\')">Done</button>';

  return html;

function renderBlockDatePicker() {
  var container = document.getElementById('blkDatePicker');
  if (!container) return;
  var year = _blkDateMonth.getFullYear(), month = _blkDateMonth.getMonth();
  var daysInMonth = new Date(year, month+1, 0).getDate();
  var firstDay = new Date(year, month, 1).getDay();
  var monthLabel = _blkDateMonth.toLocaleString('default',{month:'long',year:'numeric'});
  var html = '<div style="width:100%">';
  html += '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">';
  html += '<button class="dnb" onclick="shiftBlockMonth(-1)">&#8592;</button>';
  html += '<span style="font-size:12px;font-weight:700;color:var(--cream)">'+monthLabel+'</span>';
  html += '<button class="dnb" onclick="shiftBlockMonth(1)">&#8594;</button>';
  html += '</div>';
  html += '<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px">';
  ['S','M','T','W','T','F','S'].forEach(function(d){html+='<div style="font-size:9px;font-weight:700;color:var(--mid);text-align:center;padding:2px">'+d+'</div>';});
  for(var i=0;i<firstDay;i++) html+='<div></div>';
  var _todayStr = fmtDate(new Date());
  for(var dd=1;dd<=daysInMonth;dd++) {
    var dateStr = year+'-'+String(month+1).padStart(2,'0')+'-'+String(dd).padStart(2,'0');
    var isSel = _blkDates.indexOf(dateStr)>=0;
    var isToday = dateStr === _todayStr;
    var cellStyle = 'text-align:center;padding:4px 2px;border-radius:4px;cursor:pointer;font-size:11px;';
    if (isSel) cellStyle += 'background:var(--yellow);color:#3d2e00;font-weight:700;';
    else if (isToday) cellStyle += 'outline:1.5px solid var(--yellow);color:var(--yellow);font-weight:700;';
    else cellStyle += 'color:var(--cream-m);';
    html+='<div onclick="toggleBlockDate(\''+dateStr+'\')" style="'+cellStyle+'">'+dd+'</div>';
  }
  html += '</div></div>';
  container.innerHTML = html;
}

function shiftBlockMonth(dir) { _blkDateMonth.setMonth(_blkDateMonth.getMonth()+dir); renderBlockDatePicker(); }

function toggleBlockDate(dateStr) {
  var idx = _blkDates.indexOf(dateStr);
  if (idx>=0) _blkDates.splice(idx,1); else _blkDates.push(dateStr);
  _blkDates.sort();
  var countEl = document.getElementById('blkDateCount');
  if (countEl) countEl.textContent = _blkDates.length;
  renderBlockDatePicker();
}

async function saveBlock() {
  var resourceId = (document.getElementById('blkResourceId')||{}).value;
  var start = (document.getElementById('blkStartTime')||{}).value;
  var end   = (document.getElementById('blkEndTime')||{}).value;
  var reason = ((document.getElementById('blkReason')||{}).value || '').trim() || null;
  if (!resourceId) { alert('Please select a resource.'); return; }
  if (!_blkDates.length) { alert('Please select at least one date.'); return; }
  if (!start || !end || start >= end) { alert('Please set a valid start and end time.'); return; }
  var brId = (branches[currentBranch]||{}).id;
  try {
    await sbPost('blocked_schedules', {
      branch_id: brId,
      resource_type: _blkType,
      resource_id: resourceId,
      dates: _blkDates,
      start_time: start,
      end_time: end,
      reason: reason,
      active: true
    });
    closeBlockPanel();
    _blkDates = [];
    await loadBlockedSchedules();
    renderTimeline();
  } catch(err) { alert('Failed to save block: '+err.message); }
}

function toggleEl(id){var el=document.getElementById(id);if(el)el.style.display=el.style.display==='none'?'':'none';}
function toggleGroup(bodyId,chevId){var b=document.getElementById(bodyId),c=document.getElementById(chevId);if(!b)return;var col=b.style.display==='none';b.style.display=col?'':'none';if(c)c.textContent=col?'▾':'▸';}

async function loadPayments(bookingId) {
  try {
    var pays = await sb('payments','select=*&booking_id=eq.'+bookingId+'&order=created_at');
    var el = document.getElementById('payList');
    if (!el) return;
    if (!pays||!pays.length) { el.innerHTML='<p style="font-size:12px;color:var(--mid)">No payments recorded.</p>'; return; }
    el.innerHTML = pays.map(function(p) {
      var isRefund = p.type==='refund';
      return '<div class="dr-pay-row">'+
        '<div><p class="dr-pay-label">'+(isRefund?'- ':'')+'\u20b1'+(p.amount||0).toLocaleString()+'</p>'+
        '<p class="dr-pay-meta">'+e(p.type.replace(/_/g,' '))+' \xb7 '+e(p.method.replace(/_/g,' '))+(p.reference_number?' \xb7 '+e(p.reference_number):'')+'</p></div>'+
        '<p style="font-size:11px;color:var(--mid)">'+new Date(p.created_at).toLocaleDateString()+'</p></div>';
    }).join('');
  } catch(err) { console.error(err); }
}

function openDrawer(bookingId) {
  var b = allBookings.find(function(x){return x.id===bookingId;}) ||
          allBookingsList.find(function(x){return x.id===bookingId;}) ||
          allCheckInList.find(function(x){return x.id===bookingId;});
  if(!b) return;
  closeFab();
  currentBookingId = bookingId;
  document.getElementById('drContent').innerHTML = buildDrawer(b);
  document.getElementById('drOverlay').classList.add('open');
  loadPayments(bookingId);
}

async function saveStatus(bookingId) {
  var st=document.getElementById('statusSel').value;
  var ps=document.getElementById('payStatusSel').value;
  // Validate inventory assignment before checking in
  if (st==='checked_in') {
    var _bk=allBookings.find(function(x){return x.id===bookingId;})||allBookingsList.find(function(x){return x.id===bookingId;})||allCheckInList.find(function(x){return x.id===bookingId;});
    if (_bk) {
      var _gd=first(_bk.grooming_details), _hd=first(_bk.hotel_details);
      if (_bk.service==='grooming' && (!_gd||!_gd.groomer_id)) {
        alert('Assign a specific groomer before checking in — "Any available" is not allowed at check-in. Use the Groomer section above.');
        return;
      }
      if (_bk.service==='hotel' && (!_hd||!_hd.room_id)) {
        alert('Assign a room before checking in. Use the Room section above.');
        return;
      }
    }
  }
  try { await sbPatch('bookings','id=eq.'+bookingId,{status:st,payment_status:ps}); closeDrawer(); await reloadAll(); } catch(err){alert('Failed: '+err.message);}
}

/* ── SIDEBAR TOGGLE ── */
function toggleSidebar() {
  var sb  = document.getElementById('sidebar');
  var btn = document.getElementById('sbToggle');
  // On mobile (<=640px), use mobile-open overlay instead of collapsed class
  if (window.innerWidth <= 640) {
    var isOpen = sb.classList.toggle('mobile-open');
    sb.classList.toggle('collapsed', !isOpen);
    btn.title = isOpen ? 'Close sidebar' : 'Open sidebar';
    return;
  }
  var collapsed = sb.classList.toggle('collapsed');
  btn.title = collapsed ? 'Expand sidebar' : 'Collapse sidebar';
}

async function setMobileBranch(idx, el) {
  // Sync mobile branch button state
  document.querySelectorAll('.mnb-br-btn').forEach(function(b){b.classList.remove('on');});
  if(el) el.classList.add('on');
  // Delegate to setBranch using the desktop br-tab element (it syncs .br-tab styling)
  var brTabs = document.querySelectorAll('.br-tab');
  var target = brTabs[idx];
  if (target) {
    await setBranch(idx, target);
  } else {
    // Fallback: manually set branch without a br-tab element
    currentBranch = idx;
    activeFilter = null;
    await Promise.all([loadRooms(), loadGroomers(), loadStudios()]);
    await loadBlockedSchedules();
    renderSidebar(); renderTabs(); await loadBookings();
    if (currentAdminPage === 'bookings') await loadBookingsList();
  }
}

async function getAuthHeaders() {
  var base = { 'apikey': SUPABASE_ANON_KEY, 'Content-Type': 'application/json' };
  // Use the token cached at login — avoids re-querying the Supabase client
  // which can silently fall back to anon after a hash-based OAuth redirect
  if (_sessionToken) {
    base['Authorization'] = 'Bearer ' + _sessionToken;
    return base;
  }
  // Fallback: ask the client (handles page reloads where _sessionToken wasn't set)
  var client = initSupabaseClient();
  if (client) {
    var sess = await client.auth.getSession();
    if (sess.data && sess.data.session) {
      _sessionToken = sess.data.session.access_token; // cache for subsequent calls
      base['Authorization'] = 'Bearer ' + _sessionToken;
      return base;
    }
  }
  base['Authorization'] = 'Bearer ' + SUPABASE_ANON_KEY;
  return base;
}

async function saveEditPanel(bookingId, b) {
  var g = function(id){var el=document.getElementById(id);return el?el.value:'';};
  var gd=first(b.grooming_details), hd=first(b.hotel_details), dd=first(b.daycare_details), sd=first(b.studio_details);
  var pet=first(b.pets)||{}, own=first(b.owners)||{};
  var btn = document.getElementById('bkBtnNext');
  if(btn){btn.disabled=true;btn.textContent='Saving…';}
  try {
    // Update pet
    if (pet.id) {
      await sbPatch('pets','id=eq.'+pet.id,{name:g('epPetName')||undefined,breed:g('epBreed')||undefined,animal_type:g('epAnimal')||undefined,gender:g('epGender')||undefined,size:g('epSize')||undefined,age_value:parseInt(g('epAge'))||undefined,age_unit:g('epAgeUnit')||undefined,medical_notes:g('epMed')||undefined,temperament:g('epTemp')||undefined});
    }
    // Update owner
    if (own.id) {
      await sbPatch('owners','id=eq.'+own.id,{first_name:g('epFirst')||undefined,last_name:g('epLast')||undefined,email:g('epEmail')||undefined,mobile:g('epPhone')||undefined,referral_source:g('epReferral')||undefined});
    }
    // Update status + admin notes
    await sbPatch('bookings','id=eq.'+bookingId,{status:g('epStatus'),payment_status:g('epPayStatus'),notes:g('epNotes')||null});
    // Update service-specific details
    if (gd) {
      var grEl=document.getElementById('epGroomer');
      var grId=grEl&&grEl.value&&grEl.value!=='any'?grEl.value:null;
      var grName=grId?(groomers.find(function(gr){return gr.id===grId;})||{name:'any'}).name:'any';
      await sbPatch('grooming_details','booking_id=eq.'+bookingId,{timeslot:g('epGSlot')||undefined,groom_service_name:g('epGSvc')||undefined,special_requests:g('epGNotes')||undefined,groomer_id:grId,preferred_stylist:grName});
      if (g('epGDate')) await sbPatch('bookings','id=eq.'+bookingId,{booking_date:g('epGDate')});
    }
    if (hd) {
      await sbPatch('hotel_details','booking_id=eq.'+bookingId,{
        checkin_date: g('epCin')||undefined,
        checkout_date: g('epCout')||undefined,
        dropoff_time: g('epDrop')||undefined,
        pickup_time: g('epPick')||undefined,
        room_id: g('epRoom')||undefined,
        playpark_consent: g('epPlaypark')==='yes',
        feeding_instructions: g('epFeed')||undefined,
        medications: g('epMeds')||undefined,
        emergency_name: g('epEmergName')||undefined,
        emergency_phone: g('epEmergPhone')||undefined,
        vet_clinic: g('epVetClinic')||undefined,
        vet_contact: g('epVetContact')||undefined,
        vet_address: g('epVetAddr')||undefined
      });
    }
    if (dd) {
      if(g('epDcDate')) await sbPatch('bookings','id=eq.'+bookingId,{booking_date:g('epDcDate')});
      await sbPatch('daycare_details','booking_id=eq.'+bookingId,{dropoff_time:g('epDcDrop')||undefined,pickup_time:g('epDcPick')||undefined,open_time:g('epDcOpen')==='yes'?true:null,notes:g('epDcNotes')||undefined});
    }
    if (sd) {
      if(g('epStDate')) await sbPatch('bookings','id=eq.'+bookingId,{booking_date:g('epStDate')});
      await sbPatch('studio_details','booking_id=eq.'+bookingId,{timeslot:g('epStSlot')||undefined});
    }
    closeBkPanel();
    await reloadAll();
  } catch(err) {
    alert('Save failed: '+err.message);
    if(btn){btn.disabled=false;btn.textContent='Save changes';}
  }
}

function openBookingPanel(bookingId, mode) {
  closeFab();
  bkEditing = bookingId;
  bkStep = 0;
  bkReset();
  bk.mode = mode || 'admin';
  if (bookingId) {
    // Pre-populate for edit — search all loaded booking stores
    var b = allBookings.find(function(x){return x.id===bookingId;}) ||
            allBookingsList.find(function(x){return x.id===bookingId;}) ||
            allCheckInList.find(function(x){return x.id===bookingId;});
    if (b) bkPrePopulate(b);
    document.getElementById('bkPanelTitle').textContent = 'Edit booking';
  } else {
    document.getElementById('bkPanelTitle').textContent = mode === 'walkin' ? 'Walk-in Booking' : 'Add booking';
  }
  bkRender();
  document.getElementById('bkOverlay').classList.add('open');
  document.getElementById('bkPanel').classList.add('open');

function bkPrePopulate(b) {
  bk.svc    = b.service        || 'grooming';
  bk.status = b.status         || 'confirmed';
  bk.paysts = b.payment_status || 'unpaid';

  var pet = first(b.pets) || {};
  bk.pname   = pet.name          || '';
  bk.panimal = pet.animal_type   || 'dog';
  bk.pgender = pet.gender        || 'male';
  bk.pbreed  = pet.breed         || '';
  bk.ptemp   = pet.temperament   || '';
  bk.pmed    = pet.medical_notes || '';
  bk.size    = pet.size          || 'small_dog';

  var own = first(b.owners) || {};
  bk.ofirst = own.first_name || '';
  bk.olast  = own.last_name  || '';
  bk.oemail = own.email      || '';
  bk.ophone = own.mobile     || '';

  var gd = first(b.grooming_details);
  if (gd) {
    bk.gsvc   = gd.groom_service_key  || 'basic';
    bk.gslot  = gd.timeslot           || '';
    bk.stylist= gd.preferred_stylist  || 'any';
    bk.gnotes = gd.special_requests   || '';
    bk.gdate  = b.booking_date        || '';
  }

  var hd = first(b.hotel_details);
  if (hd) {
    bk.hcin    = hd.checkin_date          || '';
    bk.hcout   = hd.checkout_date         || '';
    bk.hroom   = hd.room_type             || '';
    bk.hroom_id= hd.room_id               || null;
    bk.hpick   = String(hd.pickup_hour    || 14);
    bk.hdrop   = hd.dropoff_time          || '10:00';
    bk.hplay   = !!hd.playpark_consent;
    bk.hfeed   = hd.feeding_instructions  || '';
    bk.hmeds   = hd.medications           || '';
    bk.hemerg  = hd.emergency_name        || '';
    bk.hemergp = hd.emergency_phone       || '';
    bk.hvet    = hd.vet_clinic            || '';
    bk.hvetc   = hd.vet_contact           || '';
    bk.hvetaddr= hd.vet_address           || '';
  }

  var dd = first(b.daycare_details);
  if (dd) {
    bk.dcdate  = b.booking_date  || '';
    bk.dcdrop  = dd.dropoff_time || '09:00';
    bk.dcpick  = dd.pickup_time  || '17:00';
    bk.dcopen  = !!dd.open_time;
    bk.dcnotes = dd.notes        || '';
  }

  var sd = first(b.studio_details);
  if (sd) {
    bk.stdate = b.booking_date || '';
    bk.stslot = sd.timeslot    || '';
  }

  // Vaccines - map back from pet_vaccines array
  var vaccArr = Array.isArray(b.pet_vaccines) ? b.pet_vaccines : [];
  var vaccNames = bk.panimal === 'cat'
    ? ['Anti-rabies','All-in-1 shot','Anti-parasitic']
    : ['Anti-rabies','5/6/8-in-1 shot','Kennel Cough / Bordetella','Tick and flea treatment'];
  bk.vacc = {};
  vaccNames.forEach(function(name, i) {
    var row = vaccArr.find(function(v){ return v.vaccine_name === name; });
    if (row) bk.vacc[i] = !!row.confirmed;
  });

  // Add-ons
  var addonArr = Array.isArray(b.booking_addons) ? b.booking_addons : [];
  bk.addons = {};
  addonArr.forEach(function(a) {
    var match = AD_ADM.find(function(x){ return x.name === a.addon_name || x.key === a.addon_key; });
    if (match) bk.addons[match.key] = true;
  });
}

function closeBkPanel(e) {
  if (e && e.target !== document.getElementById('bkOverlay')) return;
  document.getElementById('bkOverlay').classList.remove('open');
  document.getElementById('bkPanel').classList.remove('open');
  var btn = document.getElementById('bkBtnNext');
  if (btn) { btn.disabled = false; }
}

function bkValidate(step) {
  if (step === 0) { // Service
    if (!bk.svc) { alert('Please select a service.'); return false; }
    return true;
  }
  if (step === 1) { // Schedule
    var tMins = function(s){ var p=(s||'').split(':'); return parseInt(p[0]||0)*60+parseInt(p[1]||0); };
    if (bk.svc === 'grooming') {
      if (!bk.size)  { alert('Please select a pet size.'); return false; }
      if (!bk.gsvc) { alert('Please select a grooming service.'); return false; }
      if (bk.gsvc === 'ala_carte' && !Object.keys(bk.addons).length) {
        alert('Ala Carte requires at least one add-on.'); return false;
      }
      if (!bk.gdate) { alert('Please select a grooming date.'); return false; }
      if (!bk.gslot) { alert('Please select a time slot.'); return false; }
    }
    if (bk.svc === 'hotel') {
      if (!bk.size) { alert('Please select a pet size.'); return false; }
      if (bk.size === 'cat' && currentBranch !== 1) {
        alert('Cat hotel is only available at Eastwood.'); return false;
      }
      if (!bk.hcin || !bk.hcout) { alert('Please select check-in and check-out dates.'); return false; }
      if (new Date(bk.hcout) <= new Date(bk.hcin)) { alert('Check-out date must be after check-in.'); return false; }
      if (!bk.hroom_id) { alert('Please select a room.'); return false; }
    }
    if (bk.svc === 'daycare') {
      if (!bk.size)   { alert('Please select a pet size.'); return false; }
      if (!bk.dcdate) { alert('Please select a daycare date.'); return false; }
      if (!bk.dcdrop) { alert('Please select a drop-off time.'); return false; }
      if (!bk.dcopen && !bk.dcpick) { alert('Please select a pick-up time.'); return false; }
      if (!bk.dcopen && bk.dcdrop && bk.dcpick) {
        if (tMins(bk.dcpick) <= tMins(bk.dcdrop)) {
          alert('Pick-up time must be after drop-off time.'); return false;
        }
      }
    }
    if (bk.svc === 'studio') {
      if (!bk.stdate) { alert('Please select a studio date.'); return false; }
      if (!bk.stslot) { alert('Please select a time slot.'); return false; }
    }
    return true;
  }
  if (step === 2) { // Pet
    if (!bk.pname.trim())  { alert("Please enter the pet's name."); return false; }
    if (!bk.panimal)       { alert('Please select Dog or Cat.'); return false; }
    if (!bk.pgender)       { alert("Please select the pet's sex."); return false; }
    if (!bk.pbreed.trim()) { alert("Please enter the pet's breed."); return false; }
    if (bk.page==='' || bk.page===null || bk.page===undefined) { alert("Please enter the pet's age."); return false; }
    if (!bk.ptemp)         { alert("Please select the pet's temperament."); return false; }
    return true;
  }
  if (step === 3) { // Owner
    if (!bk.ofirst.trim() || !bk.olast.trim()) { alert("Please enter the owner's full name."); return false; }
    if (!bk.oemail.trim() || bk.oemail.indexOf('@') === -1) { alert('Please enter a valid email address.'); return false; }
    if (!bk.ophone.trim()) { alert('Please enter a mobile number.'); return false; }
    return true;
  }
  return true; // Steps 4 (Details) and 5 (Summary) have no blocking required fields
}
function bkNext() {
  if (!bkValidate(bkStep)) return;
  if (bkStep < BK_STEP_NAMES.length - 1) { bkStep++; bkRender(); }
  else { saveBkBooking(); }
}
function bkPrev() {
  if (bkStep > 0) { bkStep--; bkRender(); }
  else { closeBkPanel(); }
}

function bkRender() {
  var sb = document.getElementById('bkStepsBar');
  if (sb) sb.innerHTML = BK_STEP_NAMES.map(function(n,i){
    var cls = i===bkStep?'bk-st on':(i<bkStep?'bk-st done':'bk-st');
    return '<div class="'+cls+'" onclick="bkGoStep('+i+')">'+n+'</div>';
  }).join('');
  var bb = document.getElementById('bkBtnBack');
  var bn = document.getElementById('bkBtnNext');
  if (bb) { bb.textContent = bkStep===0 ? 'Cancel' : 'Back'; bb.onclick = bkPrev; }
  if (bn) { bn.textContent = bkStep===BK_STEP_NAMES.length-1 ? 'Save booking' : 'Continue'; bn.onclick = bkNext; bn.disabled = false; }
  var body = document.getElementById('bkPanelBody');
  if (body) {
    var fns = [bkRSvc, bkRSched, bkRPet, bkROwner, bkRDet, bkRSum];
    body.innerHTML = fns[bkStep]();
  }

async function loadAdminGroomSlots() {
  var dateEl    = document.getElementById('bkGDate');
  var stylistEl = document.getElementById('bkStylist');
  var slotsEl   = document.getElementById('bkGSlots');
  if (!slotsEl) return;
  var dateVal   = dateEl ? dateEl.value : bk.gdate;
  var groomerId = stylistEl ? stylistEl.value : (bk.stylistId || '');
  // Sync bk state from DOM
  if (dateEl && dateEl.value) bk.gdate = dateEl.value;
  if (stylistEl) bkSetStylist(stylistEl);

  if (!dateVal) {
    slotsEl.innerHTML = '<p style="color:var(--mid);font-size:12px">Select a date and groomer to see available slots.</p>';
    return;
  }

  slotsEl.innerHTML = '<p style="color:var(--mid);font-size:12px">Loading slots…</p>';

  var ALL_SLOTS = ['9:00 AM','10:00 AM','11:00 AM','12:00 PM','1:00 PM','2:00 PM','3:00 PM','4:00 PM','5:00 PM'];

  try {
    // Get branch id
    var br = branches[currentBranch];
    var branchId = br ? br.id : '';

    // Step 1: get booking IDs for this date + branch (not cancelled/rejected)
    var bkRows = await sb('bookings', 'select=id&branch_id=eq.'+branchId+'&booking_date=eq.'+dateVal+'&status=neq.cancelled&status=neq.rejected');
    var bkIds = (bkRows||[]).map(function(r){ return r.id; });

    var takenByGroomer = {};
    if (bkIds.length) {
      // Step 2: get grooming_details for those bookings
      var gdRows = await sb('grooming_details', 'select=timeslot,groomer_id&booking_id=in.('+bkIds.join(',')+')');
      (gdRows||[]).forEach(function(r) {
        var gid = r.groomer_id || 'any';
        if (!takenByGroomer[gid]) takenByGroomer[gid] = [];
        takenByGroomer[gid].push(r.timeslot);
      });
    }

    var dayOfWeek = new Date(dateVal+'T00:00:00').getDay();
    var disabledSlots = new Set();
    var selectedGroomer = groomerId && groomerId !== 'any' ? groomers.find(function(g){ return g.id===groomerId; }) : null;

    ALL_SLOTS.forEach(function(slot) {
      if (groomerId && groomerId !== 'any') {
        // Check if this groomer is booked
        if ((takenByGroomer[groomerId]||[]).indexOf(slot) >= 0) { disabledSlots.add(slot); return; }
      } else {
        // 'any' — slot disabled only if ALL available groomers are taken
        var freeGroomers = groomers.filter(function(g){
          return !g.is_unavailable && (takenByGroomer[g.id]||[]).indexOf(slot) < 0;
        });
        if (!freeGroomers.length) disabledSlots.add(slot);
      }
    });

    slotsEl.innerHTML = ALL_SLOTS.map(function(slot) {
      var taken = disabledSlots.has(slot);
      var sel   = bk.gslot === slot;
      return '<button class="time-slot-btn'+(sel?' on':'')+(taken?' taken':'')+'" '+
        (taken ? 'disabled' : 'onclick="selGSlot(\''+slot+'\')"')+'>'+slot+'</button>';
    }).join('');

  } catch(err) {
    slotsEl.innerHTML = '<p style="color:var(--error);font-size:12px">Could not load slots.</p>';
    console.error('loadAdminGroomSlots error:', err);
  }
}
