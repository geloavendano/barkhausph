/* CALCULATIONS */
function bkNights() {
  if (!bk.hcin || !bk.hcout) return 0;
  return Math.max(0, Math.round((new Date(bk.hcout) - new Date(bk.hcin)) / 86400000));
}
function bkHrs() {
  if (!bk.dcdrop || !bk.dcpick || bk.dcopen) return 0;
  var t = function(str) { var p=str.split(':'); return parseInt(p[0])*60+parseInt(p[1]); };
  return Math.max(0, Math.round((t(bk.dcpick) - t(bk.dcdrop)) / 60));
}
function bkCHotel() {
  var n = bkNights(); if (!n) return 0;
  var cin = new Date(bk.hcin); var tot = 0;
  for (var i=0; i<n; i++) {
    var d = new Date(cin); d.setDate(d.getDate()+i);
    var dw = d.getDay();
    tot += (dw===0||dw===5||dw===6 ? HR_ADM.weekend : HR_ADM.weekday)[bk.size] || 0;
  }
  return tot;
}
function bkCLate() {
  if (bk.svc!=='hotel') return 0;
  return Math.max(0, (parseInt(bk.hpick)||14) - 14) * HOTEL_LATE_RATE;
}
function bkCBase() {
  if (bk.svc==='grooming') {
    var base = bk.gsvc!=='ala_carte' ? (GP_ADM[bk.gsvc][bk.size]||0) : 0;
    return base + Object.keys(bk.addons).reduce(function(acc,k) {
      var a = AD_ADM.find(function(x){return x.key===k;}); if(!a||a.assessment) return acc;
      if (k==='face_trim' && bk.gsvc==='premium') return acc; // included in premium
      return acc + (a.sizeDependent ? (FT_ADM[bk.size]||0) : a.price);
    }, 0);
  }
  if (bk.svc==='hotel')   return bkCHotel();
  if (bk.svc==='daycare') return DR_ADM[bk.size] || 0;
  return 0;
}

/* MEMBERSHIP VALIDATION */
async function bkApplyMember() {
  if (bk.memvalid) {
    // Remove applied discount
    bk.memvalid = false; bk.memcode = ''; bkRender(); return;
  }
  var inp = document.getElementById('bkMemCode');
  var code = inp ? inp.value.trim().toUpperCase() : bk.memcode.trim().toUpperCase();
  if (!code) { alert('Please enter a member code.'); return; }
  bk.memcode = code;
  try {
    var rows = await sb('members', 'member_code=eq.'+encodeURIComponent(code)+'&select=member_code,tier,active,valid_until,branch_id&limit=1');
    if (!rows || !rows.length || !rows[0].active) {
      alert('Member code not found or inactive.'); return;
    }
    var m = rows[0];
    if (m.valid_until && new Date(m.valid_until) < new Date()) {
      alert('This membership has expired (valid until '+m.valid_until+').'); return;
    }
    // Standard memberships are branch-specific — verify against current branch
    if (m.tier !== 'passport' && m.branch_id) {
      var curBranch = branches[currentBranch];
      if (curBranch && m.branch_id !== curBranch.id) {
        var memberBranchObj = branches.find(function(b){ return b.id === m.branch_id; });
        var memberBranchName = memberBranchObj ? memberBranchObj.name : 'another branch';
        alert('This Standard membership is for '+memberBranchName+', not the current branch ('+curBranch.name+'). Passport members can use all branches.'); return;
      }
    }
    bk.memvalid = true;
    bkRender();
  } catch(ex) {
    alert('Could not verify membership: '+ex.message);
  }
}

/* SAVE */
async function saveBkBooking() {
  // Guard: pricing must be loaded — a ₱0 booking in the DB is unrecoverable without manual fix
  if (!_pricingLoaded) {
    alert('Pricing data is unavailable. Please refresh the page before saving a booking.');
    return;
  }
  var btn = document.getElementById('bkBtnNext');
  if (btn) { btn.textContent = 'Saving...'; btn.disabled = true; }

  var vaccNames = bk.panimal==='cat'
    ? ['Anti-rabies','All-in-1 shot','Anti-parasitic']
    : ['Anti-rabies','5/6/8-in-1 shot','Kennel Cough / Bordetella','Tick and flea treatment'];

  var subtotal    = bkCBase();
  var discAmt     = bk.memvalid ? Math.round(subtotal*(MD_ADM[bk.svc]||0)) : 0;
  var total       = subtotal - discAmt + bkCLate();
  var payMethodDb = bk.paymethod ? bk.paymethod.toLowerCase().replace(/ \/ /g,'_').replace(/ /g,'_') : '';

  try {
    if (bkEditing) {
      // ── EDIT MODE: direct PATCH calls, no edge function ──────────────────
      // 1. Find the booking to get pet_id and owner_id
      var existing = allBookings.find(function(x){return x.id===bkEditing;}) ||
                     allBookingsList.find(function(x){return x.id===bkEditing;}) ||
                     allCheckInList.find(function(x){return x.id===bkEditing;});
      if (!existing) throw new Error('Booking not found in current view. Please refresh.');

      var existingPet   = first(existing.pets)   || {};
      var existingOwner = first(existing.owners) || {};

      // 2. Patch booking core fields
      await sbPatch('bookings','id=eq.'+bkEditing,{
        status:          bk.status,
        payment_status:  bk.paysts,
        booking_date:    bk.svc==='grooming'?bk.gdate:(bk.svc==='daycare'?bk.dcdate:(bk.svc==='studio'?bk.stdate:null)),
        subtotal:        subtotal,
        discount_amount: discAmt,
        total:           total
      });

      // 3. Patch pet
      if (existingPet.id) {
        await sbPatch('pets','id=eq.'+existingPet.id,{
          name:          bk.pname.trim(),
          animal_type:   bk.panimal,
          gender:        bk.pgender,
          breed:         bk.pbreed||null,
          age_value:     bk.page?parseInt(bk.page):null,
          age_unit:      bk.pageunit||'years',
          size:          bk.size||null,
          medical_notes: bk.pmed||null,
          temperament:   bk.ptemp||null
        });
      }

      // 4. Patch owner
      if (existingOwner.id) {
        await sbPatch('owners','id=eq.'+existingOwner.id,{
          first_name:      bk.ofirst.trim(),
          last_name:       bk.olast.trim(),
          email:           bk.oemail.trim()||null,
          mobile:          bk.ophone.trim(),
          referral_source: bk.osource||null
        });
      }

      // 5. Patch service detail row
      if (bk.svc==='grooming') {
        await sbPatch('grooming_details','booking_id=eq.'+bkEditing,{
          timeslot:           bk.gslot,
          preferred_stylist:  bk.stylist||'any',
          groomer_id:         bk.stylistId||null,
          groom_service_key:  bk.gsvc||'basic',
          groom_service_name: (GS_ADM.find(function(x){return x.k===bk.gsvc;})||{n:''}).n,
          special_requests:   bk.gnotes||null
        });
        // Replace add-ons
        await sbDelete('booking_addons','booking_id=eq.'+bkEditing);
        var addonRows = Object.keys(bk.addons).map(function(k){
          var a=AD_ADM.find(function(x){return x.key===k;});
          return {booking_id:bkEditing,addon_key:k,addon_name:a?a.name:k,price:a?(a.sizeDependent?(FT_ADM[bk.size]||0):a.price):0};
        });
        if (addonRows.length) await sbPost('booking_addons',addonRows);
      }
      if (bk.svc==='hotel') {
        await sbPatch('hotel_details','booking_id=eq.'+bkEditing,{
          checkin_date:         bk.hcin,
          checkout_date:        bk.hcout,
          dropoff_time:         bk.hdrop||null,
          pickup_time:          bk.hpick||null,
          pickup_hour:          parseInt(bk.hpick)||14,
          room_type:            bk.hroom||null,
          room_id:              bk.hroom_id||null,
          playpark_consent:     bk.hplay,
          feeding_instructions: bk.hfeed||null,
          medications:          bk.hmeds||null,
          emergency_name:       bk.hemerg||null,
          emergency_phone:      bk.hemergp||null,
          vet_clinic:           bk.hvet||null,
          vet_contact:          bk.hvetc||null,
          vet_address:          bk.hvetaddr||null
        });
      }
      if (bk.svc==='daycare') {
        var openT = bk.dcopen===true;
        await sbPatch('daycare_details','booking_id=eq.'+bkEditing,{
          dropoff_time: bk.dcdrop||'',
          pickup_time:  openT?null:(bk.dcpick||null),
          open_time:    openT,
          notes:        bk.dcnotes||null
        });
      }
      if (bk.svc==='studio') {
        await sbPatch('studio_details','booking_id=eq.'+bkEditing,{ timeslot: bk.stslot||'' });
      }

      // 6. Replace vaccines
      await sbDelete('pet_vaccines','booking_id=eq.'+bkEditing);
      var vaccRows = Object.keys(bk.vacc).map(function(i){
        return {booking_id:bkEditing,vaccine_name:vaccNames[parseInt(i)],confirmed:bk.vacc[i]};
      }).filter(function(r){return r.vaccine_name;});
      if (vaccRows.length) await sbPost('pet_vaccines',vaccRows);

      // 7. Record payment if applicable
      if (bk.paysts!=='unpaid' && payMethodDb) {
        await sbPost('payments',{
          booking_id:       bkEditing,
          amount:           total,
          type:             'balance',
          method:           payMethodDb,
          reference_number: bk.payref||null,
          recorded_by:      bk.recby
        });
      }

      // 8. Audit log with field-level diff
      var changes = {};
      if (existing.status       !== bk.status)  changes.status       = {from:existing.status,       to:bk.status};
      if (existing.payment_status!==bk.paysts)  changes.payment_status={from:existing.payment_status,to:bk.paysts};
      if (existingPet.name      !== bk.pname)   changes.pet_name     = {from:existingPet.name,       to:bk.pname};

      await sbPost('booking_edits',{
        booking_id:    bkEditing,
        edited_by_name:bk.recby,
        field_changes: JSON.stringify(Object.keys(changes).length ? changes : {admin_edit:true})
      });

      closeBkPanel();
      await reloadAll();
      alert('Booking updated.');

    } else {
      // ── CREATE MODE: use submit-booking edge function ─────────────────────
      if (!branches[currentBranch]) throw new Error('Branch not found');

      var payload = {
        location: currentBranch===0 ? 'estancia' : 'eastwood',
        service: bk.svc,
        petName: bk.pname, petAnimal: bk.panimal, petGender: bk.pgender,
        petBreed: bk.pbreed, petAge: bk.page, petAgeUnit: bk.pageunit,
        petSize: bk.size, petMedical: bk.pmed, petTemperament: bk.ptemp,
        ownerFirst: bk.ofirst, ownerLast: bk.olast,
        ownerEmail: bk.oemail, ownerPhone: bk.ophone, ownerSource: bk.osource,
        groomDate: bk.gdate, groomSlot: bk.gslot,
        groomService: bk.gsvc, preferredStylist: bk.stylist,
        hotelCheckin: bk.hcin, hotelCheckout: bk.hcout,
        hotelRoom: bk.hroom, hotelRoomId: bk.hroom_id,
        hotelDropoff: bk.hdrop, hotelPickup: bk.hpick, hotelPickupHour: parseInt(bk.hpick)||14,
        playparkConsent: bk.hplay ? 'yes' : 'no',
        hotelFeeding: bk.hfeed, hotelMeds: bk.hmeds,
        emergencyName: bk.hemerg, emergencyPhone: bk.hemergp,
        vetClinic: bk.hvet, vetContact: bk.hvetc, vetAddress: bk.hvetaddr,
        daycareDate: bk.dcdate, daycareDropoff: bk.dcdrop, daycarePickup: bk.dcpick,
        daycareOpenTime: bk.dcopen, daycareNotes: bk.dcnotes||null,
        studioDate: bk.stdate, studioSlot: bk.stslot,
        addons: Object.keys(bk.addons).reduce(function(acc,k){
          var a=AD_ADM.find(function(x){return x.key===k;});
          if(a&&!a.assessment) acc[k]=(a.sizeDependent?(FT_ADM[bk.size]||0):a.price);
          return acc;
        },{}),
        vaccines: Object.keys(bk.vacc).reduce(function(acc,i){
          if(vaccNames[parseInt(i)]) acc[vaccNames[parseInt(i)]]=bk.vacc[i];
          return acc;
        },{}),
        waiverGeneral: bk.wgen, waiverVaccine: bk.wvacc,
        waiverSeniorMedical: false, waiverStudio: false, waiverMedia: bk.wmedia,
        membershipId: bk.memvalid ? bk.memcode : null,
        subtotal: subtotal, discountAmount: discAmt, total: total,
        adminCreated: true,
        booking_source: bk.mode || 'admin'
      };

      var EDGE_URL = SUPABASE_URL + '/functions/v1/submit-booking';
      var hdrs = await getAuthHeaders();
      var res  = await fetch(EDGE_URL, {method:'POST', headers:hdrs, body:JSON.stringify(payload)});
      var data = await res.json();
      if (data.error) throw new Error(data.error);

      // Patch status/payment since admin sets these directly
      if (data.booking_id) {
        await sbPatch('bookings','id=eq.'+data.booking_id,{status:bk.status,payment_status:bk.paysts,booking_source:bk.mode||'admin'});
        if (bk.paysts!=='unpaid' && payMethodDb) {
          await sbPost('payments',{
            booking_id:       data.booking_id,
            amount:           total,
            type:             'downpayment',
            method:           payMethodDb,
            reference_number: bk.payref||null,
            recorded_by:      bk.recby
          });
        }
      }

      closeBkPanel();
      await reloadAll();
      alert('Booking created: ' + (data.ref_number||'done'));
    }

  } catch(err) {
    alert('Failed to save booking: ' + err.message);
    if (btn) { btn.textContent = 'Save booking'; btn.disabled = false; }
  }
}

function fmtDate(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function fmtTime(t){
  if(!t) return '—';
  // t may be "HH:MM", "HH:MM:SS", or already "H:MM AM/PM"
  if(/[aApP][mM]/.test(t)) return t; // already formatted
  var parts = t.split(':');
  var h = parseInt(parts[0],10);
  var m = parts[1]||'00';
  if(isNaN(h)) return t;
  var ampm = h>=12 ? 'PM' : 'AM';
  var h12 = h%12 || 12;
  return h12+':'+String(m).padStart(2,'0')+' '+ampm;
}

async function loadCheckInPage() {
  var el = document.getElementById('pageCheckIn');
  var br = branches[currentBranch];
  if (!br) { el.innerHTML = '<p style="color:var(--mid);padding:16px">No branch selected.</p>'; return; }
  el.innerHTML = '<p style="color:var(--mid);padding:16px">Loading check-ins…</p>';
  var todayStr = fmtDate(new Date());
  try {
    var sel = 'id,ref_number,service,status,payment_status,booking_date,total,created_at,notes,'+
      'owners(first_name,last_name,mobile),'+
      'pets(name,breed,animal_type,size),'+
      'grooming_details(timeslot,groom_service_name,groomer_id),'+
      'hotel_details(checkin_date,checkout_date,dropoff_time,pickup_time,room_type,room_id),'+
      'daycare_details(dropoff_time,pickup_time,open_time),'+
      'studio_details(timeslot),'+
      'checkin_notes(general_remarks,addon_purchases,physical_inspection_notes,personal_items,vacc_complete,skin_coat_good,skin_coat_remarks,ears_nose_eyes_good,ears_nose_eyes_remarks,nails_good,nails_remarks,joints_good,joints_remarks)';
    var b = 'branch_id=eq.'+br.id;

    // Confirmed + Pending non-hotel: booking_date <= today
    var nonHotelDue = await sb('bookings',
      'select='+sel+'&'+b+'&service=not.eq.hotel&status=in.(confirmed,pending)&booking_date=lte.'+todayStr+'&order=booking_date');

    // Checked-in non-hotel: booking_date <= today (in progress or overdue)
    var nonHotelCI = await sb('bookings',
      'select='+sel+'&'+b+'&service=not.eq.hotel&status=eq.checked_in&booking_date=lte.'+todayStr+'&order=booking_date');

    // Hotel: fetch confirmed/pending/checked_in, filter client-side on the joined date columns
    var hotelAll = await sb('bookings',
      'select='+sel+'&'+b+'&service=eq.hotel&status=in.(confirmed,pending,checked_in)&order=created_at');

    var hotelFiltered = (hotelAll||[]).filter(function(bk) {
      var hd = Array.isArray(bk.hotel_details)?(bk.hotel_details[0]||null):bk.hotel_details;
      if (!hd) return false;
      // Confirmed/Pending: checkin date is today or past (due for check-in)
      if (bk.status==='confirmed'||bk.status==='pending') return hd.checkin_date <= todayStr;
      // Checked-in: checkout date is today or past (due/overdue for checkout)
      if (bk.status==='checked_in') return hd.checkout_date <= todayStr;
      return false;
    });

    // Merge, deduplicate, store
    var seen = {}, all = [];
    [(nonHotelDue||[]), (nonHotelCI||[]), hotelFiltered].forEach(function(arr){
      arr.forEach(function(bk){ if(!seen[bk.id]){ seen[bk.id]=true; all.push(bk); } });
    });
    allCheckInList = all;
    renderCheckInPage(all, todayStr);
  } catch(err) {
    console.error(err);
    el.innerHTML = '<p style="color:var(--error);padding:16px">Failed to load. Try refreshing.</p>';
  }
}

function renderCheckInPage(bookings, todayStr) {
  var el = document.getElementById('pageCheckIn');
  var svcLabels = {grooming:'Grooming',hotel:'Pet Hotel',daycare:'Daycare',studio:'Studio'};
  var svcColors = {grooming:'#4D96B9',hotel:'#EF9F27',daycare:'#1D9E75',studio:'#D4537E'};

  // Categorise: Check In needed vs Checkout/Completion needed vs In Progress
  var needCheckin = [], needCheckout = [], inProgress = [];
  bookings.forEach(function(b) {
    var hd = Array.isArray(b.hotel_details)?(b.hotel_details[0]||null):b.hotel_details;
    var isCheckedIn = b.status === 'checked_in';
    var isHotel = b.service === 'hotel';
    if (isHotel && hd && hd.checkout_date <= todayStr && isCheckedIn) {
      needCheckout.push(b);
    } else if (isCheckedIn) {
      inProgress.push(b);
    } else {
      needCheckin.push(b);
    }
  });

  function sortByTime(arr) {
    return arr.sort(function(a, b) {
      function getTime(bk) {
        var gd = Array.isArray(bk.grooming_details)?(bk.grooming_details[0]||null):bk.grooming_details;
        var hd = Array.isArray(bk.hotel_details)?(bk.hotel_details[0]||null):bk.hotel_details;
        var dd = Array.isArray(bk.daycare_details)?(bk.daycare_details[0]||null):bk.daycare_details;
        var sd = Array.isArray(bk.studio_details)?(bk.studio_details[0]||null):bk.studio_details;
        return (gd&&gd.timeslot)||(hd&&hd.dropoff_time)||(dd&&dd.dropoff_time)||(sd&&sd.timeslot)||'99:99';
      }
      return getTime(a).localeCompare(getTime(b));
    });
  }
  sortByTime(needCheckin); sortByTime(needCheckout); sortByTime(inProgress);

  function buildCard(b, actionLabel, actionColor) {
    var gd = Array.isArray(b.grooming_details)?(b.grooming_details[0]||null):b.grooming_details;
    var hd = Array.isArray(b.hotel_details)?(b.hotel_details[0]||null):b.hotel_details;
    var dd = Array.isArray(b.daycare_details)?(b.daycare_details[0]||null):b.daycare_details;
    var sd = Array.isArray(b.studio_details)?(b.studio_details[0]||null):b.studio_details;
    var pet = Array.isArray(b.pets)?(b.pets[0]||{}):b.pets||{};
    var owner = Array.isArray(b.owners)?(b.owners[0]||{}):b.owners||{};
    var rawTime = (gd&&gd.timeslot)||(hd&&hd.dropoff_time)||(dd&&dd.dropoff_time)||(sd&&sd.timeslot)||'';
    var time = fmtTime(rawTime);
    var svcColor = svcColors[b.service]||'#888';
    var statusColor = {pending:'#FFCE58',confirmed:'#4D96B9',checked_in:'#1D9E75',completed:'#6BCB77'}[b.status]||'#888';
    var isOverdue = hd && hd.checkout_date && hd.checkout_date < todayStr;
    var h = '<div class="ci-card" onclick="openDrawer(\''+b.id+'\')" style="background:var(--surface);border:0.5px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:8px;cursor:pointer;transition:background 0.12s;border-left:3px solid '+actionColor+'">';
    h += '<div style="display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:6px">';
    h += '<div style="display:flex;align-items:center;gap:7px">';
    h += '<span style="font-size:11px;background:'+svcColor+'22;color:'+svcColor+';padding:2px 7px;border-radius:4px;font-weight:700">'+e(svcLabels[b.service]||b.service)+'</span>';
    h += '<span style="font-size:12px;font-weight:700;color:var(--cream)">'+e(b.ref_number||'-')+'</span>';
    h += '</div>';
    h += '<span style="font-size:11px;font-weight:700;padding:2px 8px;border-radius:10px;background:'+actionColor+'22;color:'+actionColor+'">'+(isOverdue?'⚠ Overdue':actionLabel)+'</span>';
    h += '</div>';
    h += '<div style="display:flex;align-items:center;justify-content:space-between;gap:8px">';
    h += '<div>';
    h += '<p style="font-size:14px;font-weight:700;color:var(--cream);margin-bottom:2px">'+e(pet.name||'-')+'</p>';
    h += '<p style="font-size:12px;color:var(--cream-m)">'+e(owner.first_name||'')+(owner.last_name?' '+e(owner.last_name):'')+'</p>';
    if (owner.mobile) h += '<p style="font-size:11px;color:var(--mid)">'+e(owner.mobile)+'</p>';
    h += '</div>';
    h += '<div style="text-align:right">';
    if (rawTime) h += '<p style="font-size:16px;font-weight:700;color:var(--cream);margin-bottom:2px">'+e(time)+'</p>';
    if (hd && hd.checkout_date) h += '<p style="font-size:10px;color:'+(isOverdue?'var(--error)':'var(--mid)')+'">out: '+e(hd.checkout_date)+'</p>';
    h += '<span style="font-size:10px;font-weight:700;color:'+statusColor+'">'+e(b.status.replace(/_/g,' '))+'</span>';
    h += '</div>';
    h += '</div>';
    h += '</div>';
    return h;
  }

  var todayLabel = (function(){
    try { var d = new Date(todayStr+'T00:00:00'); return d.toLocaleDateString('en-PH',{weekday:'long',year:'numeric',month:'long',day:'numeric'}); } catch(x){ return todayStr; }
  })();

  var html = '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;flex-wrap:wrap;gap:8px">';
  html += '<h2 style="font-family:\'Fredoka One\',cursive;font-size:20px;margin:0">Check In</h2>';
  html += '<button onclick="loadCheckInPage()" style="font-size:11px;color:var(--mid);background:transparent;border:0.5px solid var(--border);border-radius:20px;padding:4px 12px;cursor:pointer;font-family:Nunito,sans-serif">&#8635; Refresh</button>';
  html += '</div>';
  html += '<p style="font-size:12px;color:var(--mid);margin-bottom:20px">'+e(todayLabel)+'</p>';

  if (!bookings.length) {
    html += '<div style="text-align:center;padding:40px 16px"><p style="font-size:32px;margin-bottom:12px">🐾</p><p style="color:var(--mid)">No active bookings for today.</p></div>';
    el.innerHTML = html; return;
  }

  function ciSection(id, label, color, cards, cardLabel, cardColor, topMargin) {
    if (!cards.length) return '';
    var chevId = id+'_chev';
    var s = '<div style="margin-top:'+(topMargin?'20px':'0')+'">';
    s += '<div onclick="toggleGroup(\''+id+'\',\''+chevId+'\')" style="display:flex;align-items:center;justify-content:space-between;cursor:pointer;padding:4px 0;margin-bottom:8px;user-select:none">';
    s += '<span style="font-size:10px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:'+color+'">'+label+'</span>';
    s += '<span id="'+chevId+'" style="font-size:14px;color:'+color+';line-height:1">▾</span>';
    s += '</div>';
    s += '<div id="'+id+'">';
    cards.forEach(function(b){ s += buildCard(b, cardLabel, cardColor); });
    s += '</div></div>';
    return s;
  }

  if (needCheckin.length) {
    html += ciSection('ci_checkin', 'Awaiting Check-In ('+needCheckin.length+')', '#EF9F27', needCheckin, 'Check In', '#EF9F27', false);
  }
  if (inProgress.length) {
    html += ciSection('ci_inprogress', 'In Progress ('+inProgress.length+')', '#1D9E75', inProgress, 'In Progress', '#1D9E75', needCheckin.length>0);
  }
  if (needCheckout.length) {
    var overdueCount = needCheckout.filter(function(b){ var hd=Array.isArray(b.hotel_details)?(b.hotel_details[0]||null):b.hotel_details; return hd && hd.checkout_date < todayStr; }).length;
    var coLabel = overdueCount ? 'Due for Checkout ('+needCheckout.length+' · '+overdueCount+' overdue)' : 'Due for Checkout ('+needCheckout.length+')';
    var coColor = overdueCount ? 'var(--error)' : '#4D96B9';
    var coCardColor = overdueCount ? '#FF6B6B' : '#4D96B9';
    html += ciSection('ci_checkout', coLabel, coColor, needCheckout, 'Checkout', coCardColor, needCheckin.length>0||inProgress.length>0);
  }
  el.innerHTML = html;
}

async function validateMemberInStore() {
  var code = (document.getElementById('memValCode').value||'').trim().toUpperCase();
  var pet  = (document.getElementById('memValPet').value||'').trim().toLowerCase().replace(/\s+/g,' ');
  var res  = document.getElementById('memValResult');
  if (!code) { res.innerHTML='<span style="color:var(--error)">Please enter a member code.</span>'; return; }
  res.innerHTML='<span style="color:var(--mid)">Validating…</span>';
  try {
    var rows = await sb('members', 'member_code=eq.'+encodeURIComponent(code)+'&select=member_code,tier,pet_name,valid_until,branch_id,active&limit=1');
    if (!rows || !rows.length) { res.innerHTML='<span style="color:var(--error)">✗ Member code not found.</span>'; return; }
    var m = rows[0];
    if (!m.active) { res.innerHTML='<span style="color:var(--error)">✗ Membership is inactive.</span>'; return; }
    if (m.valid_until && new Date(m.valid_until) < new Date()) {
      var expFmt = new Date(m.valid_until+'T00:00:00').toLocaleDateString('en-PH',{year:'numeric',month:'long',day:'numeric'});
      res.innerHTML='<span style="color:var(--error)">✗ Membership expired on '+expFmt+'.</span>'; return;
    }
    var regPet = (m.pet_name||'').trim().toLowerCase().replace(/\s+/g,' ');
    if (pet && regPet && regPet !== pet) { res.innerHTML='<span style="color:var(--error)">✗ Pet name does not match records.</span>'; return; }

    var isPassport  = m.tier === 'passport';
    var tierLabel   = isPassport ? 'Passport' : 'Standard';
    var branchObj   = m.branch_id ? branches.find(function(b){ return b.id === m.branch_id; }) : null;
    var branchName  = isPassport ? 'All Branches' : (branchObj ? branchObj.name : (m.branch_id ? 'Unknown branch' : '⚠ No branch assigned'));
    var validStr   = m.valid_until
      ? 'Valid until ' + new Date(m.valid_until+'T00:00:00').toLocaleDateString('en-PH',{year:'numeric',month:'long',day:'numeric'})
      : 'No expiry set';

    res.innerHTML =
      '<div style="background:rgba(107,203,119,0.1);border:0.5px solid rgba(107,203,119,0.35);border-radius:8px;padding:12px 14px;margin-top:4px">'+
      '<div style="display:flex;align-items:center;gap:6px;margin-bottom:6px">'+
        '<span style="color:var(--success);font-size:15px;font-weight:700">✓ Valid Member</span>'+
        '<span style="background:rgba(107,203,119,0.2);color:var(--success);font-size:10px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;padding:2px 7px;border-radius:20px">'+e(tierLabel)+'</span>'+
      '</div>'+
      '<div style="font-size:12px;color:var(--cream-m);line-height:1.7">'+
        '<div><span style="color:var(--mid);width:70px;display:inline-block">Coverage</span>'+e(branchName)+'</div>'+
        '<div><span style="color:var(--mid);width:70px;display:inline-block">Validity</span>'+e(validStr)+'</div>'+
        (m.pet_name?'<div><span style="color:var(--mid);width:70px;display:inline-block">Pet</span>'+e(m.pet_name)+'</div>':'')+
      '</div>'+
      '</div>';
  } catch(err) {
    res.innerHTML='<span style="color:var(--error)">Error: '+e(err.message)+'</span>';
  }
}

async function handleMemberCsv(input) {
  var file = input.files[0];
  if (!file) return;
  var res = document.getElementById('csvUploadResult');
  res.innerHTML='<span style="color:var(--mid)">Parsing…</span>';
  var text = await file.text();
  var lines = text.split('\n').map(function(l){return l.trim();}).filter(Boolean);
  if (!lines.length) { res.innerHTML='<span style="color:var(--error)">Empty file.</span>'; return; }
  // Parse headers
  var headers = lines[0].split(',').map(function(h){return h.trim().replace(/^"|"$/g,'');});
  var idIdx   = headers.findIndex(function(h){return h.toLowerCase()==='membership id';});
  var petIdx  = headers.findIndex(function(h){return h.toLowerCase()==='pet name';});
  var dateIdx = headers.findIndex(function(h){return h.toLowerCase()==='valid until date';});
  var brIdx   = headers.findIndex(function(h){return h.toLowerCase()==='branch';});
  if (idIdx<0||petIdx<0) { res.innerHTML='<span style="color:var(--error)">Missing required columns: "Membership ID" and "Pet Name".</span>'; return; }
  var rows = [];
  for (var i=1;i<lines.length;i++) {
    var cols = lines[i].split(',').map(function(c){return c.trim().replace(/^"|"$/g,'');});
    var memberCode = (cols[idIdx]||'').trim().toUpperCase();
    if (!memberCode) continue;
    var branchName = brIdx>=0 ? (cols[brIdx]||'').trim() : '';
    var brMatch = branchName ? branches.find(function(b){return b.name.toLowerCase()===branchName.toLowerCase();}) : null;
    rows.push({ member_code:memberCode, pet_name:(cols[petIdx]||'').trim()||null, valid_until:(dateIdx>=0&&cols[dateIdx])?cols[dateIdx]||null:null, branch_id:brMatch?brMatch.id:null, active:true, updated_at:new Date().toISOString() });
  }
  if (!rows.length) { res.innerHTML='<span style="color:var(--error)">No valid rows found.</span>'; return; }
  res.innerHTML='<span style="color:var(--mid)">Uploading '+rows.length+' rows…</span>';
  try {
    var added=0, updated=0;
    for (var j=0;j<rows.length;j+=50) {
      var batch = rows.slice(j,j+50);
      var existing = await sb('members', 'member_code=in.('+batch.map(function(r){return encodeURIComponent(r.member_code);}).join(',')+')'+'&select=member_code');
      var existingCodes = (existing||[]).map(function(r){return r.member_code;});
      batch.forEach(function(r){ if(existingCodes.indexOf(r.member_code)>=0)updated++;else added++; });
      var hdrs = await getAuthHeaders();
      hdrs['Prefer'] = 'resolution=merge-duplicates,return=minimal';
      await fetch(SUPABASE_URL+'/rest/v1/members', {method:'POST', headers:hdrs, body:JSON.stringify(batch)});
    }
    res.innerHTML='<span style="color:var(--success)">✓ Done: '+added+' added, '+updated+' updated.</span>';
    input.value='';
  } catch(err) {
    res.innerHTML='<span style="color:var(--error)">Upload failed: '+e(err.message)+'</span>';
  }
}

// ── REALTIME SYNC + AUTO-REFRESH fallback (5 min) ──
// Realtime: Supabase websocket pushes booking INSERT/UPDATE events instantly.
// Auto-refresh: 5-minute fallback catches block schedule changes and any missed events.
// NOTE: Realtime must be enabled on the `bookings` table in Supabase Dashboard →
//       Database → Replication → toggle on "bookings".

var _autoRefreshTimer = null;
var _realtimeChannel  = null;
var _reloadDebounce   = null;

// Debounced reload — batches rapid events (e.g. multi-row saves) into one reload
function reloadAllDebounced() {
  if (_reloadDebounce) clearTimeout(_reloadDebounce);
  _reloadDebounce = setTimeout(async function() {
    _reloadDebounce = null;
    try { await reloadAll(); } catch(e) { /* silent */ }
  }, 1200);
}

function startRealtimeSync() {
  var client = initSupabaseClient();
  if (!client || _realtimeChannel) return;
  _realtimeChannel = client
    .channel('admin-bookings-sync')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'bookings' },
      function(payload) {
        console.log('[Realtime] booking', payload.eventType, payload.new?.id || payload.old?.id || '');
        reloadAllDebounced();
      })
    .subscribe(function(status) {
      console.log('[Realtime] status:', status);
    });
}

function stopRealtimeSync() {
  var client = initSupabaseClient();
  if (client && _realtimeChannel) {
    client.removeChannel(_realtimeChannel);
    _realtimeChannel = null;
  }
}

function startAutoRefresh() {
  if (_autoRefreshTimer) return;
  _autoRefreshTimer = setInterval(async function() {
    try {
      if (currentAdminPage === 'calendar') await loadBlockedSchedules();
      await reloadAll();
    } catch(e) { /* silent */ }
  }, 300000); // 5 minutes
}

function stopAutoRefresh() {
  if (_autoRefreshTimer) { clearInterval(_autoRefreshTimer); _autoRefreshTimer = null; }
}

// Pause polling when tab is hidden; reconnect realtime if dropped on return
document.addEventListener('visibilitychange', function() {
  if (document.hidden) {
    stopAutoRefresh();
  } else {
    startAutoRefresh();
    if (!_realtimeChannel) startRealtimeSync();
  }
});
</script>
