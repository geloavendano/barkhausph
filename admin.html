<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Barkhaus Admin</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>

  :root{--bg:#0F1C26;--surface:#1A3044;--raised:#1F3D55;--border:rgba(77,150,185,0.22);--mid:#6AAEC8;--cream:#F0EDE6;--cream-m:#B8D4E0;--blue:#4D96B9;--yellow:#FFCE58;--error:#FF6B6B;--success:#6BCB77;--amber:#EF9F27;--pink:#D4537E;--teal:#1D9E75;--purple:#9B95E8;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--cream);font-family:"Nunito",sans-serif;font-size:13px;height:100svh;overflow:hidden;display:flex;flex-direction:column;}
  /* GATE */
  #gate{position:fixed;inset:0;background:var(--bg);z-index:999;display:flex;align-items:center;justify-content:center;padding:24px;}
  .gate-card{background:var(--surface);border:0.5px solid var(--border);border-radius:16px;padding:32px 28px;width:100%;max-width:320px;text-align:center;}
  .gate-logo{font-family:"Fredoka One",cursive;font-size:22px;color:var(--cream);margin-bottom:4px;}.gate-logo span{color:var(--yellow);}
  .gate-sub{font-size:12px;color:var(--mid);margin-bottom:20px;}
  .gate-input{width:100%;background:var(--raised);border:1.5px solid var(--border);border-radius:10px;padding:11px 14px;color:var(--cream);font-family:"Nunito",sans-serif;font-size:15px;outline:none;margin-bottom:10px;text-align:center;letter-spacing:0.1em;}
  .gate-input:focus{border-color:var(--blue);}
  .gate-btn{width:100%;background:var(--yellow);color:var(--bg);border:none;border-radius:50px;padding:11px;font-size:13px;font-weight:700;cursor:pointer;font-family:"Nunito",sans-serif;}
  .gate-error{font-size:12px;color:var(--error);margin-top:8px;font-weight:600;min-height:16px;}
  /* APP */
  #app{display:none;flex-direction:column;height:100svh;overflow:hidden;}
  #app.visible{display:flex;}
  /* TOP BAR */
  .topbar{background:var(--surface);border-bottom:0.5px solid var(--border);padding:0 16px;height:48px;display:flex;align-items:center;gap:12px;flex-shrink:0;z-index:20;}
  .topbar-logo{font-family:"Fredoka One",cursive;font-size:17px;color:var(--cream);}
  .topbar-logo span{color:var(--yellow);}
  .date-nav{display:flex;align-items:center;gap:6px;margin-left:auto;}
  .dnb{width:28px;height:28px;border-radius:6px;border:0.5px solid var(--border);background:transparent;cursor:pointer;color:var(--mid);display:flex;align-items:center;justify-content:center;font-size:13px;font-family:"Nunito",sans-serif;}
  .dnb:hover{background:var(--raised);}
  .date-label{font-size:13px;font-weight:700;color:var(--cream);min-width:144px;text-align:center;}
  .today-btn{font-size:11px;font-weight:700;padding:4px 12px;border-radius:20px;border:0.5px solid var(--border);background:transparent;cursor:pointer;color:var(--mid);font-family:"Nunito",sans-serif;}
  .today-btn:hover{background:var(--raised);}
  /* BODY */
  .body{display:flex;flex:1;overflow:hidden;}
  /* SIDEBAR */
  .sidebar{width:196px;flex-shrink:0;border-right:0.5px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--raised) transparent;transition:width 0.25s cubic-bezier(0.4,0,0.2,1);}
  .sidebar.collapsed{width:40px;overflow:hidden;}
  .sidebar.collapsed .sb-sec,.sidebar.collapsed .sb-div,.sidebar.collapsed .branch-tabs{display:none;}
  .sb-toggle{width:100%;height:36px;background:transparent;border:none;border-bottom:0.5px solid var(--border);cursor:pointer;color:var(--mid);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:14px;transition:background 0.15s;}
  .sb-toggle:hover{background:var(--raised);}
  .fab{position:fixed;bottom:24px;right:24px;background:var(--yellow);color:#3d2e00;border:none;border-radius:50px;padding:11px 20px;font-size:13px;font-weight:700;cursor:pointer;font-family:"Nunito",sans-serif;z-index:50;display:flex;align-items:center;gap:6px;box-shadow:none;}
  .branch-tabs{display:flex;gap:4px;padding:8px;border-bottom:0.5px solid var(--border);}
  .br-tab{flex:1;font-size:11px;font-weight:700;padding:5px 4px;border-radius:20px;border:0.5px solid var(--border);cursor:pointer;background:transparent;color:var(--mid);font-family:"Nunito",sans-serif;text-align:center;transition:all 0.15s;}
  .br-tab.on{background:var(--yellow);border-color:var(--yellow);color:#3d2e00;}
  .sb-sec{padding:8px 8px 4px;}
  .sb-sec-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px;}
  .sb-sec-title{font-size:9px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--mid);}
  .sb-item{display:flex;align-items:center;gap:7px;padding:5px 7px;border-radius:7px;cursor:pointer;transition:background 0.12s;margin-bottom:2px;user-select:none;}
  .sb-item:hover{background:var(--raised);}
  .sb-item.on{background:var(--raised);outline:0.5px solid var(--border);}
  .sb-dot{width:9px;height:9px;border-radius:2px;flex-shrink:0;}
  .sb-dot.round{border-radius:50%;}
  .sb-lbl{font-size:12px;color:var(--cream-m);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .sb-item.on .sb-lbl,.sb-item:hover .sb-lbl{color:var(--cream);}
  .sb-ct{font-size:10px;font-weight:700;color:var(--mid);min-width:12px;text-align:right;}
  .sb-lock{font-size:10px;color:var(--amber);}
  .sb-unavail{font-size:10px;color:var(--error);}
  .sb-edit{font-size:10px;color:var(--mid);opacity:0;padding:1px 5px;border-radius:4px;border:0.5px solid var(--border);background:transparent;cursor:pointer;font-family:"Nunito",sans-serif;transition:opacity 0.15s;}
  .sb-item:hover .sb-edit{opacity:1;}
  .sb-add-btn{width:100%;padding:5px 7px;font-size:11px;color:var(--mid);background:transparent;border:0.5px dashed var(--border);border-radius:7px;cursor:pointer;font-family:"Nunito",sans-serif;text-align:left;margin:4px 0;}
  .sb-add-btn:hover{border-color:var(--blue);color:var(--blue);}
  .sb-div{height:0.5px;background:var(--border);margin:4px 8px;}
  /* MAIN */
  .main-content{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}
  /* SVC TABS */
  .svc-tabs{display:flex;border-bottom:0.5px solid var(--border);background:var(--surface);flex-shrink:0;}
  .svc-tab{padding:10px 20px;cursor:pointer;border-bottom:2.5px solid transparent;transition:border-color 0.15s,background 0.15s;}
  .svc-tab:hover{background:var(--raised);}
  .svc-tab.on{border-bottom-color:currentColor;}
  .svc-tab-count{font-size:22px;font-weight:500;line-height:1.1;}
  .svc-tab-label{font-size:11px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;margin-top:2px;opacity:0.7;}
  /* TIMELINE */
  .tl-scroll{flex:1;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--raised) transparent;}
  .tl-body{display:flex;}
  .tl-times{width:50px;flex-shrink:0;}
  .tl-lbl{height:90px;display:flex;align-items:flex-start;padding:5px 8px 0 0;justify-content:flex-end;font-size:10px;color:var(--mid);font-weight:600;border-top:0.5px solid var(--border);}
  .tl-lbl:first-child{border-top:none;}
  .tl-col{flex:1;position:relative;}
  .tl-inner{position:relative;height:990px;}
  .tl-line{position:absolute;left:0;right:0;height:0.5px;background:var(--border);pointer-events:none;}
  /* BOOKING CARDS */
  .bk{position:absolute;border-radius:6px;padding:5px 7px;cursor:pointer;border-left:3px solid transparent;overflow:hidden;transition:filter 0.12s;z-index:2;}
  .bk:hover{filter:brightness(1.08);z-index:10;}
  .bk-pet{font-size:12px;font-weight:700;color:var(--cream);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center;gap:4px;}
  .bk-sub{font-size:10px;color:var(--cream-m);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .bk-tag{font-size:9px;font-weight:700;margin-top:3px;padding:1px 5px;border-radius:3px;display:inline-block;letter-spacing:0.03em;}
  /* BREAK BLOCKS */
  .bk-break{position:absolute;border-radius:4px;padding:4px 7px;pointer-events:none;z-index:1;opacity:0.7;}
  .bk-break-lbl{font-size:10px;font-weight:600;color:var(--cream-m);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  /* STATUS DOTS */
  .sdot{width:6px;height:6px;border-radius:50%;display:inline-block;flex-shrink:0;}
  /* PANEL (Add/Edit Room/Groomer) */
  .panel-overlay{position:fixed;inset:0;background:rgba(10,20,30,0.55);z-index:300;display:none;}
  .panel-overlay.open{display:block;}
  .panel{position:fixed;top:0;right:0;bottom:0;width:360px;background:var(--bg);border-left:0.5px solid var(--border);z-index:301;display:flex;flex-direction:column;transform:translateX(100%);transition:transform 0.28s cubic-bezier(0.4,0,0.2,1);}
  .panel.open{transform:translateX(0);}
  .panel-head{padding:16px;border-bottom:0.5px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
  .panel-title{font-family:"Fredoka One",cursive;font-size:18px;color:var(--cream);}
  .panel-close{background:var(--surface);border:0.5px solid var(--border);border-radius:50%;width:28px;height:28px;cursor:pointer;color:var(--mid);font-size:16px;display:flex;align-items:center;justify-content:center;font-family:"Nunito",sans-serif;}
  .panel-body{flex:1;overflow-y:auto;padding:16px;scrollbar-width:thin;}
  .panel-footer{padding:14px 16px;border-top:0.5px solid var(--border);display:flex;gap:8px;flex-shrink:0;}
  /* FORM ELEMENTS */
  .fg{margin-bottom:14px;}
  .fl{font-size:10px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--mid);margin-bottom:6px;display:block;}
  .fi,.fs{width:100%;background:var(--surface);border:1.5px solid var(--border);border-radius:8px;padding:9px 12px;color:var(--cream);font-family:"Nunito",sans-serif;font-size:13px;outline:none;}
  .fi:focus,.fs:focus{border-color:var(--blue);}
  .fs option{background:var(--surface);}
  .ft{width:100%;background:var(--surface);border:1.5px solid var(--border);border-radius:8px;padding:9px 12px;color:var(--cream);font-family:"Nunito",sans-serif;font-size:13px;outline:none;resize:vertical;min-height:60px;}
  /* COLOR PICKER */
  .color-picker{display:flex;gap:7px;flex-wrap:wrap;}
  .cp-dot{width:26px;height:26px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform 0.12s;}
  .cp-dot.on{border-color:var(--cream);transform:scale(1.1);}
  /* DAYS PICKER */
  .days-picker{display:flex;gap:5px;}
  .day-btn{width:30px;height:30px;border-radius:50%;border:1px solid var(--border);background:transparent;color:var(--mid);font-size:11px;font-weight:700;cursor:pointer;font-family:"Nunito",sans-serif;transition:all 0.12s;}
  .day-btn.on{background:var(--blue);border-color:var(--blue);color:#fff;}
  /* SIZE CHECKS */
  .size-checks{display:flex;gap:6px;flex-wrap:wrap;}
  .sz-btn{font-size:11px;font-weight:600;padding:4px 10px;border-radius:20px;border:0.5px solid var(--border);background:transparent;color:var(--mid);cursor:pointer;font-family:"Nunito",sans-serif;transition:all 0.12s;}
  .sz-btn.on{background:var(--raised);border-color:var(--cream-m);color:var(--cream);}
  /* TOGGLE */
  .toggle-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;}
  .toggle-lbl{font-size:12px;color:var(--cream-m);}
  .toggle{width:40px;height:22px;background:var(--raised);border-radius:11px;position:relative;cursor:pointer;transition:background 0.2s;flex-shrink:0;}
  .toggle.on{background:var(--blue);}
  .toggle::after{content:"";position:absolute;top:3px;left:3px;width:16px;height:16px;border-radius:50%;background:#fff;transition:transform 0.2s;}
  .toggle.on::after{transform:translateX(18px);}
  /* BREAK ROWS */
  .break-rows{display:flex;flex-direction:column;gap:8px;margin-bottom:8px;}
  .break-row{background:var(--surface);border:0.5px solid var(--border);border-radius:8px;padding:10px 12px;}
  .break-row-head{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
  .break-row-del{margin-left:auto;background:transparent;border:none;color:var(--error);cursor:pointer;font-size:14px;font-family:"Nunito",sans-serif;}
  /* PANEL BUTTONS */
  .btn-save{flex:1;background:var(--yellow);color:#3d2e00;border:none;border-radius:50px;padding:10px;font-size:13px;font-weight:700;cursor:pointer;font-family:"Nunito",sans-serif;}
  .btn-cancel{flex:0 0 auto;padding:10px 18px;background:transparent;border:0.5px solid var(--border);border-radius:50px;font-size:13px;font-weight:700;color:var(--mid);cursor:pointer;font-family:"Nunito",sans-serif;}
  .btn-delete{flex:0 0 auto;padding:10px 14px;background:transparent;border:0.5px solid rgba(255,107,107,0.4);border-radius:50px;font-size:13px;font-weight:700;color:var(--error);cursor:pointer;font-family:"Nunito",sans-serif;}
  /* DRAWER */
  .dr-overlay{position:fixed;inset:0;background:rgba(10,20,30,0.7);z-index:200;display:none;align-items:flex-end;justify-content:center;}
  .dr-overlay.open{display:flex;}
  .drawer{background:var(--bg);width:100%;max-width:520px;max-height:90svh;border-radius:20px 20px 0 0;overflow-y:auto;padding:18px 18px 28px;animation:slideUp 0.28s ease;}
  @keyframes slideUp{from{transform:translateY(100%);}to{transform:translateY(0);}}
  .dr-handle{width:36px;height:4px;border-radius:2px;background:var(--raised);margin:0 auto 16px;}
  .dr-close{float:right;background:var(--surface);border:0.5px solid var(--border);border-radius:50%;width:28px;height:28px;cursor:pointer;color:var(--mid);font-size:16px;display:flex;align-items:center;justify-content:center;font-family:"Nunito",sans-serif;}
  .dr-ref{font-size:10px;color:var(--mid);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:2px;}
  .dr-name{font-family:"Fredoka One",cursive;font-size:22px;color:var(--cream);margin-bottom:2px;}
  .dr-breed{font-size:13px;color:var(--cream-m);margin-bottom:12px;}
  .dr-status-row{display:flex;align-items:center;gap:8px;margin-bottom:12px;}
  .dr-time{font-size:13px;font-weight:600;color:var(--cream);}
  .dr-status-pill{font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;}
  .dr-pay-pill{font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;}
  .dr-medical{background:rgba(239,159,39,0.1);border-left:3px solid var(--amber);border-radius:0 6px 6px 0;padding:8px 12px;margin-bottom:10px;}
  .dr-medical-lbl{font-size:10px;font-weight:700;letter-spacing:0.07em;text-transform:uppercase;color:var(--amber);margin-bottom:3px;}
  .dr-medical-txt{font-size:12px;color:var(--cream);line-height:1.5;}
  .dr-vacc-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px;}
  .dr-vacc{font-size:11px;font-weight:600;}
  .dr-sec{border-top:0.5px solid var(--border);padding-top:10px;margin-top:10px;}
  .dr-sec-title{font-size:9px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--mid);margin-bottom:8px;}
  .dr-row{display:flex;justify-content:space-between;align-items:flex-start;padding:3px 0;gap:10px;}
  .dr-key{font-size:12px;color:var(--mid);flex-shrink:0;}
  .dr-val{font-size:12px;color:var(--cream);font-weight:500;text-align:right;}
  .dr-pay-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:0.5px solid rgba(77,150,185,0.1);}
  .dr-pay-row:last-child{border-bottom:none;}
  .dr-pay-label{font-size:12px;color:var(--cream-m);}
  .dr-pay-amt{font-size:12px;font-weight:600;color:var(--cream);}
  .dr-pay-meta{font-size:10px;color:var(--mid);margin-top:1px;}
  .dr-ctas{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px;}
  .dr-btn-sec{padding:10px;font-size:12px;font-weight:700;border:0.5px solid var(--border);border-radius:8px;background:transparent;color:var(--cream-m);cursor:pointer;font-family:"Nunito",sans-serif;}
  .dr-btn-pri{padding:10px;font-size:12px;font-weight:700;border:none;border-radius:8px;background:rgba(77,150,185,0.18);color:var(--blue);cursor:pointer;font-family:"Nunito",sans-serif;}
  .dr-btn-pay{width:100%;padding:9px;font-size:12px;font-weight:700;border:0.5px dashed var(--border);border-radius:8px;background:transparent;color:var(--mid);cursor:pointer;font-family:"Nunito",sans-serif;margin-top:8px;text-align:center;}
  .dr-btn-pay:hover{border-color:var(--success);color:var(--success);}
  .status-select{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:8px 12px;color:var(--cream);font-family:"Nunito",sans-serif;font-size:13px;width:100%;outline:none;margin-top:8px;cursor:pointer;}
  .save-btn{width:100%;background:var(--blue);color:#fff;border:none;border-radius:50px;padding:10px;font-size:12px;font-weight:700;cursor:pointer;font-family:"Nunito",sans-serif;margin-top:8px;}


  .yn-btn{font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;border:0.5px solid var(--border);background:transparent;color:var(--mid);cursor:pointer;font-family:"Nunito",sans-serif;}
  .yn-on-y{background:rgba(107,203,119,0.18);border-color:var(--success);color:var(--success);}
  .yn-on-n{background:rgba(255,107,107,0.18);border-color:var(--error);color:var(--error);}


  /* ── MONTH CALENDAR OVERLAY ── */
  .cal-overlay{position:fixed;inset:0;background:rgba(10,20,30,0.72);z-index:400;display:none;align-items:center;justify-content:center;}
  .cal-overlay.open{display:flex;}
  .cal-modal{background:var(--bg);border:0.5px solid var(--border);border-radius:18px;padding:20px;width:320px;animation:fadeIn 0.2s ease;}
  @keyframes fadeIn{from{opacity:0;transform:scale(0.96);}to{opacity:1;transform:scale(1);}}
  .cal-modal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
  .cal-modal-month{font-family:"Fredoka One",cursive;font-size:18px;color:var(--cream);}
  .cal-modal-nav{display:flex;gap:6px;}
  .cal-modal-nav button{width:28px;height:28px;border-radius:6px;border:0.5px solid var(--border);background:transparent;cursor:pointer;color:var(--mid);font-family:"Nunito",sans-serif;font-size:13px;}
  .cal-modal-close{font-size:16px;color:var(--mid);background:transparent;border:none;cursor:pointer;font-family:"Nunito",sans-serif;margin-left:8px;}
  .cal-dow-row{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:4px;}
  .cal-dow-cell{font-size:10px;font-weight:700;color:var(--mid);text-align:center;padding-bottom:4px;}
  .cal-days-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
  .cal-day-cell{height:38px;border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:background 0.12s;position:relative;}
  .cal-day-cell:hover{background:var(--raised);}
  .cal-day-cell.other{opacity:0.3;}
  .cal-day-cell.is-today{background:var(--yellow);}
  .cal-day-cell.is-today .cal-day-num{color:#3d2e00;font-weight:700;}
  .cal-day-cell.is-selected:not(.is-today){background:var(--raised);outline:1.5px solid var(--blue);}
  .cal-day-num{font-size:13px;color:var(--cream-m);}
  .cal-day-dot{width:4px;height:4px;border-radius:50%;background:var(--blue);margin-top:1px;}
  .cal-day-cell.is-today .cal-day-dot{background:#3d2e00;}

  /* ── CURRENT TIME INDICATOR ── */
  .time-now-line{position:absolute;left:0;right:0;height:2px;background:#FF6B6B;z-index:20;pointer-events:none;}
  .time-now-dot{position:absolute;left:-4px;top:-4px;width:10px;height:10px;border-radius:50%;background:#FF6B6B;}

  /* ── ROTATED NARROW CARD ── */
  .bk-name-rotated{writing-mode:vertical-rl;text-orientation:mixed;transform:rotate(180deg);font-size:11px;font-weight:700;color:var(--cream);white-space:nowrap;overflow:hidden;max-height:100%;text-overflow:ellipsis;line-height:1.2;}

</style>
</head>
<body>

<!-- GATE -->
<div id="gate">
  <div class="gate-card">
    <p class="gate-logo">BARK<span>HAUS</span></p>
    <p class="gate-sub">Admin access only</p>
    <button class="gate-btn" id="gateBtn" onclick="signInWithGoogle()" style="display:flex;align-items:center;justify-content:center;gap:10px;background:#fff;color:#3c4043;font-family:'Nunito',sans-serif;font-size:14px;font-weight:500;border:1px solid #dadce0;border-radius:4px;padding:10px 24px;cursor:pointer;width:100%;letter-spacing:normal;text-transform:none">

var supabaseClient = null;

function initSupabaseClient() {
  if (!supabaseClient && window.supabase) {
    supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  }
  return supabaseClient;
}

async function signInWithGoogle() {
  var errEl = document.getElementById('gateError');
  var btn   = document.getElementById('gateBtn');
  btn.disabled = true;
  errEl.textContent = '';
  try {
    var client = initSupabaseClient();
    var result = await client.auth.signInWithOAuth({
      provider: 'google',
      options: {
        redirectTo: window.location.href
      }
    });
    if (result.error) throw result.error;
    // Browser will redirect to Google - no further action needed here
  } catch(err) {
    errEl.textContent = err.message || 'Sign in failed. Please try again.';
    btn.disabled = false;
  }
}

async function checkExistingSession() {
  var client = initSupabaseClient();
  if (!client) return;
  var result = await client.auth.getSession();
  if (result.data && result.data.session) {
    // Verify this email is on the admin allowlist
    var allowed = await verifyAdminAccess(result.data.session);
    if (allowed) {
      document.getElementById('gate').style.display = 'none';
      document.getElementById('app').classList.add('visible');
      init();
    } else {
      await client.auth.signOut();
      document.getElementById('gateError').textContent = 'Access denied. Your account is not authorized.';
    }
  }
}

async function verifyAdminAccess(session) {
  try {
    var url = SUPABASE_URL + '/rest/v1/admin_users?select=email&email=eq.' + encodeURIComponent(session.user.email) + '&limit=1';
    var res = await fetch(url, {
      headers: {
        'apikey':        SUPABASE_ANON_KEY,
        'Authorization': 'Bearer ' + session.access_token,
        'Content-Type':  'application/json'
      }
    });
    var rows = await res.json();
    return Array.isArray(rows) && rows.length > 0;
  } catch(e) {
    console.error('Allowlist check failed:', e);
    return false;
  }
}

  if (offset > 0) document.getElementById('tlScroll').scrollTop = offset;
}

/* ── SUPABASE ── */
async function sb(path, params) {
  var url = SUPABASE_URL+'/rest/v1/'+path+(params?'?'+params:'');
  var res = await fetch(url, {headers: await getAuthHeaders()});
  if (!res.ok) { var t=await res.text(); throw new Error(res.status+': '+t); }
  return res.json();
}
async function sbPost(path, body) {
  var hdrs = await getAuthHeaders();
  hdrs['Prefer'] = 'return=representation';
  var res = await fetch(SUPABASE_URL+'/rest/v1/'+path, {method:'POST',headers:hdrs,body:JSON.stringify(body)});
  return res.json();
}
async function sbPatch(path, params, body) {
  var hdrs = await getAuthHeaders();
  hdrs['Prefer'] = 'return=representation';
  var res = await fetch(SUPABASE_URL+'/rest/v1/'+path+'?'+params, {method:'PATCH',headers:hdrs,body:JSON.stringify(body)});
  return res.json();
}
async function sbDelete(path, params) {
  var res = await fetch(SUPABASE_URL+'/rest/v1/'+path+'?'+params, {method:'DELETE',headers: await getAuthHeaders()});
  return res.ok;
}

/* ── DATA LOADING ── */

  try { branches = await sb('branches','select=id,name&order=created_at'); } catch(e) { branches=[]; }
}
async function loadRooms() {
  var br = branches[currentBranch];
  if (!br) return;
  try { rooms = await sb('rooms','select=*&branch_id=eq.'+br.id+'&active=eq.true&order=sort_order'); } catch(e) { rooms=[]; }
}
async function loadGroomers() {
  var br = branches[currentBranch];
  if (!br) return;
  try { groomers = await sb('groomers','select=*&branch_id=eq.'+br.id+'&active=eq.true&order=sort_order'); } catch(e) { groomers=[]; }
}
async function loadGroomerBlocks() {
  if (!groomers.length) return;
  var ids = groomers.map(function(g){return g.id;}).join(',');
  try { groomerBlocks = await sb('groomer_blocks','select=*&groomer_id=in.('+ids+')&active=eq.true'); } catch(e) { groomerBlocks=[]; }
}
async function loadBookings() {
  document.getElementById('tlInner').innerHTML = '<div style="padding:40px;color:var(--mid)">Loading...</div>';

  var dateStr = fmtDate(currentDate);
  var sel = 'id,ref_number,service,status,payment_status,booking_date,total,subtotal,discount_amount,'+

  try {

/* ── SIDEBAR ── */
function renderSidebar() {
  var dow = currentDate.getDay();
  var rHtml = rooms.map(function(r) {
    var cnt = allBookings.filter(function(b){ return b.service==='hotel' && b.hotel_details && b.hotel_details.room_id===r.id; }).length;
    var isOn = activeFilter && activeFilter.type==='room' && activeFilter.id===r.id;
    var lockIcon = r.is_locked ? ' <span class="sb-lock" title="'+e(r.lock_reason||'Locked')+'">&#128274;</span>' : '';
    return '<div class="sb-item'+(isOn?' on':'')+'" onclick="toggleFilter(\'room\',\''+r.id+'\')">'+
      '<div class="sb-dot" style="background:'+r.color+'"></div>'+
      '<span class="sb-lbl">'+e(r.name)+'</span>'+lockIcon+
      '<span class="sb-ct">'+cnt+'</span>'+
      '<button class="sb-edit" onclick="event.stopPropagation();openRoomPanel(\''+r.id+'\')">&#9998;</button>'+
      '</div>';
  }).join('');
  document.getElementById('roomList').innerHTML = rHtml;

  var gHtml = groomers.map(function(g) {
    var cnt = allBookings.filter(function(b){ return b.service==='grooming' && b.grooming_details && b.grooming_details.groomer_id===g.id; }).length;
    var isOn = activeFilter && activeFilter.type==='groomer' && activeFilter.id===g.id;
    var unavIcon = g.is_unavailable ? ' <span class="sb-unavail" title="'+e(g.unavailable_reason||'Unavailable')+'">&#9888;</span>' : '';
    var blocks = groomerBlocks.filter(function(bl){ return bl.groomer_id===g.id && (bl.days_of_week.length===0 || bl.days_of_week.indexOf(dow)!==-1); });
    var blkLbl = blocks.length ? '<span style="font-size:9px;color:var(--mid);margin-left:2px">'+blocks.length+' block'+(blocks.length>1?'s':'')+'</span>' : '';
    return '<div class="sb-item'+(isOn?' on':'')+'" onclick="toggleFilter(\'groomer\',\''+g.id+'\')">'+
      '<div class="sb-dot round" style="background:'+g.color+'"></div>'+
      '<span class="sb-lbl">'+e(g.name)+blkLbl+'</span>'+unavIcon+
      '<span class="sb-ct">'+cnt+'</span>'+
      '<button class="sb-edit" onclick="event.stopPropagation();openGroomerPanel(\''+g.id+'\')">&#9998;</button>'+

function toggleFilter(type, id) {
  if (activeFilter && activeFilter.type===type && activeFilter.id===id) { activeFilter=null; }
  else { activeFilter={type:type,id:id}; if(type==='room') currentSvc='hotel'; if(type==='groomer') currentSvc='grooming'; }
  renderSidebar(); renderTabs(); renderTimeline();
}

    var cnt = allBookings.filter(function(b){return b.service===s.key;}).length;
    var on  = currentSvc===s.key;

/* ── TIME LABELS ── */
function renderTimeLbls() {
  var html='';
  for(var h=9;h<=20;h++) html+='<div class="tl-lbl">'+(h<12?h+'AM':(h===12?'12PM':(h-12)+'PM'))+'</div>';
  document.getElementById('tlTimes').innerHTML=html;
}

/* ── TIMELINE ── */
function renderTimeline() {
  var dow = currentDate.getDay();
  var filtered = allBookings.filter(function(b) {
    if (b.service!==currentSvc) return false;
    if (activeFilter) {
      if (activeFilter.type==='room')    return b.hotel_details    && b.hotel_details.room_id===activeFilter.id;
      if (activeFilter.type==='groomer') return b.grooming_details && b.grooming_details.groomer_id===activeFilter.id;
    }
    return true;
  });

  var gridHtml='';
  for(var h=0;h<=11;h++) gridHtml+='<div class="tl-line" style="top:'+(h*90)+'px"></div>';

  var breakHtml='';
  if (currentSvc==='grooming') {
    var bGroomers = activeFilter && activeFilter.type==='groomer'
      ? groomers.filter(function(g){return g.id===activeFilter.id;})
      : groomers;
    bGroomers.forEach(function(g) {
      var blocks = groomerBlocks.filter(function(bl){
        return bl.groomer_id===g.id && bl.active && (bl.days_of_week.length===0 || bl.days_of_week.indexOf(dow)!==-1);
      });
      blocks.forEach(function(bl) {
        var st = parseMins(bl.start_time);
        var en = parseMins(bl.end_time);
        if (st===null||en===null) return;
        var top = Math.max(0,(st-DAY_START)*PX_PER_MIN);
        var ht  = Math.max(22,(en-st)*PX_PER_MIN);
        breakHtml += '<div class="bk-break" style="top:'+top+'px;height:'+ht+'px;left:3px;right:3px;background:rgba(106,174,200,0.12);border-left:3px solid rgba(106,174,200,0.4)">'+
          '<span class="bk-break-lbl">'+e(bl.label)+(bGroomers.length>1?' - '+e(g.name):'')+'</span></div>';
      });
    });
  }

  var positioned = layoutBks(filtered);
  var cardsHtml = positioned.map(function(item){ return renderCard(item); }).join('');
  document.getElementById('tlInner').innerHTML = gridHtml + breakHtml + cardsHtml;
  renderTimeNowLine();
}

function parseMins(s) {
  if (!s) return null;
  var m = s.match(/(\d+):(\d+)\s*(AM|PM)?/i);
  if (!m) return null;
  var h=parseInt(m[1]),min=parseInt(m[2]),ap=m[3]?m[3].toUpperCase():null;
  if (ap==='PM'&&h!==12) h+=12;
  if (ap==='AM'&&h===12) h=0;
  return h*60+min;
}

function getBookingTimes(b) {
  var svc=b.service, st=null, en=null;
  if (svc==='grooming'){var gd=b.grooming_details||{}; st=parseMins(gd.timeslot); en=st?st+(GROOM_DURATIONS[gd.groom_service_key||'basic']||60):null;}
  else if (svc==='hotel'){var hd=b.hotel_details||{},ds=fmtDate(currentDate),cin=hd.checkin_date,cout=hd.checkout_date; if(cin===ds){st=parseMins(hd.dropoff_time)||DAY_START;en=20*60;}else if(cout===ds){st=DAY_START;en=parseMins(hd.pickup_time)||20*60;}else{st=DAY_START;en=20*60;}}
  else if (svc==='daycare'){var dd=b.daycare_details||{}; st=parseMins(dd.dropoff_time)||DAY_START; en=dd.open_time?20*60:(parseMins(dd.pickup_time)||20*60);}
  else if (svc==='studio'){var sd=b.studio_details||{}; st=parseMins(sd.timeslot); en=st?st+60:null;}
  return {st:st||DAY_START, en:en||Math.min((st||DAY_START)+60,20*60)};
}

function layoutBks(bookings) {
  var items = bookings.map(function(b){ var t=getBookingTimes(b); return {b:b,st:t.st,en:t.en,col:0,total:1}; }).sort(function(a,c){return a.st-c.st;});
  var cols=[];
  items.forEach(function(item){
    var placed=false;
    for(var c=0;c<cols.length;c++){var last=cols[c][cols[c].length-1];if(last.en<=item.st){cols[c].push(item);item.col=c;placed=true;break;}}
    if(!placed){item.col=cols.length;cols.push([item]);}
  });
  var total=Math.max(1,cols.length);
  items.forEach(function(item){
    var conc=1;
    cols.forEach(function(col){col.forEach(function(o){if(o.st<item.en&&o.en>item.st)conc=Math.max(conc,o.col+1);});});
    item.total=conc;
  });
  return items;
}

function renderCard(item) {

  var color='#6AAEC8', bg='rgba(106,174,200,0.12)';

  else if (b.service==='hotel'&&hd&&hd.room_type) { var rc={large_cage:'#EF9F27',medium_cage:'#4D96B9',small_cage:'#1D9E75',single_cabin:'#D4537E',villa:'#9B95E8'}; color=rc[hd.room_type]||color; bg=hexBg(color); }

    (ht>52?'<div class="bk-sub">'+e(detailLine)+'</div>':'')+(ht>72?'<div class="bk-sub">'+e(ownerName)+'</div>':'')+'</div>';
}

function hexBg(hex) {
  var r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),bl=parseInt(hex.slice(5,7),16);
  return 'rgba('+r+','+g+','+bl+',0.14)';
}

/* ── ADD/EDIT ROOM PANEL ── */
function colorPickerHtml(selectedColor, idPrefix) {
  return '<div class="color-picker">'+COLORS_8.map(function(c){return '<div class="cp-dot'+(c===selectedColor?' on':'')+'" style="background:'+c+'" onclick="selectColor(\''+idPrefix+'\',\''+c+'\',this)" title="'+COLOR_NAMES[c]+'"></div>';}).join('')+'</div>'+
    '<input type="hidden" id="'+idPrefix+'_color" value="'+(selectedColor||COLORS_8[0])+'">';
}
function selectColor(prefix,color,dot){
  document.querySelectorAll('[id^="'+prefix+'_"] ~ .color-picker .cp-dot, .color-picker .cp-dot').forEach(function(d){d.classList.remove('on');});
  dot.classList.add('on');
  var inp=document.getElementById(prefix+'_color'); if(inp)inp.value=color;
}
function daysPickerHtml(selectedDays, id) {
  return '<div class="days-picker">'+DAY_LABELS.map(function(d,i){return '<button class="day-btn'+(selectedDays.indexOf(i)!==-1?' on':'')+'" onclick="toggleDay(this,'+i+',\''+id+'\')" type="button">'+d+'</button>';}).join('')+'</div>'+
    '<input type="hidden" id="'+id+'_days" value="'+JSON.stringify(selectedDays)+'">';
}
function toggleDay(btn,day,id){
  btn.classList.toggle('on');
  var inp=document.getElementById(id+'_days');
  var days=JSON.parse(inp.value||'[]');
  var idx=days.indexOf(day);
  if(idx===-1)days.push(day);else days.splice(idx,1);
  days.sort();inp.value=JSON.stringify(days);
}
function sizeChecksHtml(selectedSizes) {
  return '<div class="size-checks">'+PET_SIZES.map(function(s){return '<button class="sz-btn'+(selectedSizes.indexOf(s)!==-1?' on':'')+'" onclick="toggleSize(this,\''+s+'\')" type="button">'+SIZE_LABELS[s]+'</button>';}).join('')+'</div>';
}
function toggleSize(btn,size){btn.classList.toggle('on');}

function openRoomPanel(roomId) {
  editingRoom = roomId ? rooms.find(function(r){return r.id===roomId;}) : null;
  var r = editingRoom || {color:COLORS_8[0],room_type:'large_cage',pet_type:'dog',allowed_sizes:[],schedule_restrictions:{},is_locked:false};
  var sr = r.schedule_restrictions||{};
  var days = sr.days_off||[];
  document.getElementById('roomPanelTitle').textContent = editingRoom ? 'Edit room' : 'Add room';
  document.getElementById('roomDeleteBtn').style.display = editingRoom ? '' : 'none';
  document.getElementById('roomPanelBody').innerHTML =
    '<div class="fg"><label class="fl">Name</label><input type="text" class="fi" id="rName" value="'+e(r.name||'')+'"></div>'+
    '<div class="fg"><label class="fl">Color</label>'+colorPickerHtml(r.color,'r')+'</div>'+
    '<div class="fg"><label class="fl">Room type</label><select class="fs" id="rType">'+Object.entries(ROOM_TYPES).map(function(kv){return '<option value="'+kv[0]+'"'+(r.room_type===kv[0]?' selected':'')+'>'+kv[1]+'</option>';}).join('')+'</select></div>'+
    '<div class="fg"><label class="fl">Pet type</label><select class="fs" id="rPetType"><option value="dog"'+(r.pet_type==='dog'?' selected':'')+'>Dog</option><option value="cat"'+(r.pet_type==='cat'?' selected':'')+'>Cat</option><option value="both"'+(r.pet_type==='both'?' selected':'')+'>Both</option></select></div>'+
    '<div class="fg"><label class="fl">Allowed sizes</label>'+sizeChecksHtml(r.allowed_sizes||[])+'</div>'+
    '<div class="fg"><label class="fl">Days off</label>'+daysPickerHtml(days,'r_sched')+'</div>'+
    '<div class="fg"><label class="fl">Available from</label><input type="time" class="fi" id="rFrom" value="'+(sr.available_from||'')+'"></div>'+
    '<div class="fg"><label class="fl">Available until</label><input type="time" class="fi" id="rUntil" value="'+(sr.available_until||'')+'"></div>'+
    '<div class="fg"><label class="fl">Notes</label><textarea class="ft" id="rNotes" placeholder="Optional">'+e(sr.notes||'')+'</textarea></div>'+
    (editingRoom?'<div class="toggle-row"><span class="toggle-lbl">Locked / temporarily unavailable</span><div class="toggle'+(r.is_locked?' on':'')+'" onclick="this.classList.toggle(\'on\')" id="rLock"></div></div>'+
    '<div class="fg"><label class="fl">Lock reason</label><input type="text" class="fi" id="rLockReason" value="'+e(r.lock_reason||'')+'"></div>':'');
  document.getElementById('roomOverlay').classList.add('open');
  document.getElementById('roomPanel').classList.add('open');
}
function closeRoomPanel(e){
  if(e&&e.target!==document.getElementById('roomOverlay'))return;
  document.getElementById('roomOverlay').classList.remove('open');
  document.getElementById('roomPanel').classList.remove('open');
}
async function saveRoom(){
  function gv(id){var el=document.getElementById(id);return el?el.value.trim():''}
  var sizes=Array.from(document.querySelectorAll('#roomPanelBody .sz-btn.on')).map(function(b){return b.textContent.trim();}).map(function(lbl){return PET_SIZES.find(function(s){return SIZE_LABELS[s]===lbl;})||lbl;});
  var sr={days_off:JSON.parse(document.getElementById('r_sched_days').value||'[]'),available_from:gv('rFrom')||null,available_until:gv('rUntil')||null,notes:gv('rNotes')||null};
  var payload={name:gv('rName'),color:gv('r_color')||COLORS_8[0],room_type:gv('rType'),pet_type:gv('rPetType'),allowed_sizes:sizes,schedule_restrictions:sr,branch_id:(branches[currentBranch]||{}).id};
  var lockEl=document.getElementById('rLock');
  if(lockEl){payload.is_locked=lockEl.classList.contains('on');payload.lock_reason=gv('rLockReason')||null;}
  try{if(editingRoom)await sbPatch('rooms','id=eq.'+editingRoom.id,payload);else await sbPost('rooms',payload);closeRoomPanel();await loadRooms();renderSidebar();}catch(err){alert('Failed: '+err.message);}
}
async function deleteRoom(){if(!editingRoom||!confirm('Remove this room?'))return;try{await sbPatch('rooms','id=eq.'+editingRoom.id,{active:false});closeRoomPanel();await loadRooms();renderSidebar();}catch(err){alert('Failed: '+err.message);}}

/* ── ADD/EDIT GROOMER PANEL ── */
function openGroomerPanel(groomerId) {
  editingGroomer = groomerId ? groomers.find(function(g){return g.id===groomerId;}) : null;
  var g = editingGroomer || {color:COLORS_8[0],schedule_restrictions:{},is_unavailable:false};
  var sr = g.schedule_restrictions||{};
  var gBlocks = editingGroomer ? groomerBlocks.filter(function(b){return b.groomer_id===editingGroomer.id;}) : [];
  breakRowCount = 0;
  document.getElementById('groomerPanelTitle').textContent = editingGroomer ? 'Edit groomer' : 'Add groomer';
  document.getElementById('groomerDeleteBtn').style.display = editingGroomer ? '' : 'none';
  var blocksHtml = '<div class="break-rows" id="breakRowsWrap">'+gBlocks.map(function(bl,i){return buildBreakRow(i,bl);}).join('')+'</div>';
  breakRowCount = gBlocks.length;
  document.getElementById('groomerPanelBody').innerHTML =
    '<div class="fg"><label class="fl">Name</label><input type="text" class="fi" id="gName" value="'+e(g.name||'')+'"></div>'+
    '<div class="fg"><label class="fl">Color</label>'+colorPickerHtml(g.color,'g')+'</div>'+
    '<div class="fg"><label class="fl">Days off</label>'+daysPickerHtml(sr.days_off||[],'g_sched')+'</div>'+
    '<div class="fg"><label class="fl">Available from</label><input type="time" class="fi" id="gFrom" value="'+(sr.available_from||'')+'"></div>'+
    '<div class="fg"><label class="fl">Available until</label><input type="time" class="fi" id="gUntil" value="'+(sr.available_until||'')+'"></div>'+
    '<div class="fg"><label class="fl">Notes</label><textarea class="ft" id="gNotes" placeholder="Optional">'+e(sr.notes||'')+'</textarea></div>'+
    '<div class="fg"><label class="fl">Time blocks (breaks)</label>'+blocksHtml+
    '<button class="sb-add-btn" onclick="addBreakRow()">+ Add block</button></div>'+
    (editingGroomer?'<div class="toggle-row"><span class="toggle-lbl">Mark as unavailable</span><div class="toggle'+(g.is_unavailable?' on':'')+'" onclick="this.classList.toggle(\'on\')" id="gUnavail"></div></div>'+
    '<div class="fg"><label class="fl">Reason</label><input type="text" class="fi" id="gUnavailReason" value="'+e(g.unavailable_reason||'')+'"></div>':'');
}
function buildBreakRow(i,bl) {
  bl=bl||{label:'Lunch break',start_time:'12:00',end_time:'13:00',days_of_week:[]};
  var id='br'+i;
  return '<div class="break-row" id="'+id+'">'+
    '<div class="break-row-head"><input type="text" class="fi" id="'+id+'_lbl" value="'+e(bl.label)+'" style="flex:1;padding:6px 10px" placeholder="Label"><button class="break-row-del" onclick="removeBreakRow(\''+id+'\')" type="button">&#128465;</button></div>'+
    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px"><div><label style="font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--mid);display:block;margin-bottom:4px">From</label><input type="time" class="fi" id="'+id+'_st" value="'+e(bl.start_time)+'" style="padding:6px 10px"></div><div><label style="font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--mid);display:block;margin-bottom:4px">Until</label><input type="time" class="fi" id="'+id+'_en" value="'+e(bl.end_time)+'" style="padding:6px 10px"></div></div>'+
    '<div>'+daysPickerHtml(bl.days_of_week||[],id+'_days')+'<span style="font-size:10px;color:var(--mid);margin-top:4px;display:block">Empty = every day</span></div></div>';
}
function addBreakRow(){var wrap=document.getElementById('breakRowsWrap');if(!wrap)return;var i=breakRowCount++;wrap.insertAdjacentHTML('beforeend',buildBreakRow(i,null));}
function removeBreakRow(id){var el=document.getElementById(id);if(el)el.remove();}
function closeGroomerPanel(e){
  if(e&&e.target!==document.getElementById('groomerOverlay'))return;
  document.getElementById('groomerOverlay').classList.remove('open');
  document.getElementById('groomerPanel').classList.remove('open');
}
async function saveGroomer(){
  function gv(id){var el=document.getElementById(id);return el?el.value.trim():''}
  var sr={days_off:JSON.parse(document.getElementById('g_sched_days').value||'[]'),available_from:gv('gFrom')||null,available_until:gv('gUntil')||null,notes:gv('gNotes')||null};
  var payload={name:gv('gName'),color:gv('g_color')||COLORS_8[0],schedule_restrictions:sr,branch_id:(branches[currentBranch]||{}).id};
  var uEl=document.getElementById('gUnavail');
  if(uEl){payload.is_unavailable=uEl.classList.contains('on');payload.unavailable_reason=gv('gUnavailReason')||null;}
  // Collect break rows
  var blocks=[];
  document.querySelectorAll('#breakRowsWrap .break-row').forEach(function(row){
    var id=row.id;
    var lbl=gv(id+'_lbl'),st=gv(id+'_st'),en=gv(id+'_en'),days=JSON.parse(document.getElementById(id+'_days_days').value||'[]');
    if(lbl&&st&&en) blocks.push({label:lbl,start_time:st,end_time:en,days_of_week:days,active:true});
  });
  try {
    var saved;
    if(editingGroomer){saved=await sbPatch('groomers','id=eq.'+editingGroomer.id,payload);}
    else{var res=await sbPost('groomers',payload);saved=Array.isArray(res)?res[0]:res;}
    if(saved&&saved.id){
      if(editingGroomer){await sbDelete('groomer_blocks','groomer_id=eq.'+editingGroomer.id);}
      if(blocks.length){var bRows=blocks.map(function(b){b.groomer_id=saved.id;return b;});await sbPost('groomer_blocks',bRows);}
    }
    closeGroomerPanel();await loadGroomers();await loadGroomerBlocks();renderSidebar();renderTimeline();
  }catch(err){alert('Failed: '+err.message);}
}
async function deleteGroomer(){if(!editingGroomer||!confirm('Remove this groomer?'))return;try{await sbPatch('groomers','id=eq.'+editingGroomer.id,{active:false});closeGroomerPanel();await loadGroomers();renderSidebar();}catch(err){alert('Failed: '+err.message);}}

/* ── SIDEBAR TOGGLE ── */
function toggleSidebar() {
  var sb  = document.getElementById('sidebar');
  var btn = document.getElementById('sbToggle');
  var collapsed = sb.classList.toggle('collapsed');
  btn.textContent = collapsed ? '‣' : '⋮';
  btn.title = collapsed ? 'Expand sidebar' : 'Collapse sidebar';
}

async function signOut() {
  var client = initSupabaseClient();
  if (client) await client.auth.signOut();
  document.getElementById('app').classList.remove('visible');
  document.getElementById('gate').style.display = 'flex';
  document.getElementById('gateEmail').value = '';
  document.getElementById('gatePw').value    = '';
}

async function getAuthHeaders() {
  var client = initSupabaseClient();
  var base   = { 'apikey': SUPABASE_ANON_KEY, 'Content-Type': 'application/json' };
  if (client) {
    var sess = await client.auth.getSession();
    if (sess.data && sess.data.session) {
      base['Authorization'] = 'Bearer ' + sess.data.session.access_token;
      return base;
    }
  }
  base['Authorization'] = 'Bearer ' + SUPABASE_ANON_KEY;
  return base;
}

/* ── DATE HELPERS ── */
function fmtDate(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
var DAYS=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
var MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
function renderDateLabel(){var d=currentDate;document.getElementById('dateLabel').textContent=DAYS[d.getDay()]+', '+MONTHS[d.getMonth()]+' '+d.getDate()+' '+d.getFullYear();}
async function shiftDate(delta){var prev=currentDate.getMonth();currentDate.setDate(currentDate.getDate()+delta);renderDateLabel();if(currentDate.getMonth()!==prev)await loadMonthDots(currentDate.getFullYear(),currentDate.getMonth());await loadBookings();}
async function goToday(){var prev=currentDate.getMonth();currentDate=new Date();renderDateLabel();if(currentDate.getMonth()!==prev)await loadMonthDots(currentDate.getFullYear(),currentDate.getMonth());await loadBookings();}
async function setBranch(idx,el){currentBranch=idx;activeFilter=null;document.querySelectorAll('.br-tab').forEach(function(t){t.classList.remove('on');});el.classList.add('on');await Promise.all([loadRooms(),loadGroomers()]);await loadGroomerBlocks();renderSidebar();renderTabs();await loadBookings();}

/* ── UTILS ── */
function e(s){return (s||'').toString().replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}


/* ── MONTH DOTS ── */
async function loadMonthDots(year, month) {
  var br = branches[currentBranch];
  if (!br || !br.id) return;
  var first = year + '-' + String(month+1).padStart(2,'0') + '-01';
  var last  = year + '-' + String(month+1).padStart(2,'0') + '-' + new Date(year, month+1, 0).getDate();
  try {
    var rows = await sb('bookings','select=booking_date&branch_id=eq.'+br.id+'&booking_date=gte.'+first+'&booking_date=lte.'+last+'&status=not.in.(cancelled,rejected)');
    calBookingDates = {};
    (rows||[]).forEach(function(r){ if(r.booking_date) calBookingDates[r.booking_date]=true; });
  } catch(e) { calBookingDates = {}; }
}

async function jumpToDay(y,m,d) {
  var prev=currentDate.getMonth();
  currentDate=new Date(y,m,d);
  renderDateLabel();
  if(currentDate.getMonth()!==prev) await loadMonthDots(y,m);
  await loadBookings();
}

/* ── MONTH CALENDAR OVERLAY ── */
var calModalDate = new Date();

function openCalOverlay() {
  calModalDate = new Date(currentDate);
  renderCalModal();
  document.getElementById('calOverlay').classList.add('open');
}
function closeCalOverlay(e) {
  if (e && e.target !== document.getElementById('calOverlay')) return;
  document.getElementById('calOverlay').classList.remove('open');
}
function shiftCalModal(delta) {
  calModalDate.setMonth(calModalDate.getMonth() + delta);
  renderCalModal();
}
function renderCalModal() {
  var y = calModalDate.getFullYear(), mon = calModalDate.getMonth();
  var today = new Date(), selDate = currentDate;
  var MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  document.getElementById('calModalMonth').textContent = MONTHS[mon] + ' ' + y;
  var dows = ['S','M','T','W','T','F','S'];
  document.getElementById('calDowRow').innerHTML = dows.map(function(d){ return '<div class="cal-dow-cell">'+d+'</div>'; }).join('');
  var first = new Date(y, mon, 1).getDay();
  var days  = new Date(y, mon+1, 0).getDate();
  var prev  = new Date(y, mon, 0).getDate();
  var html  = '';
  for (var i=0;i<first;i++) {
    html += '<div class="cal-day-cell other"><span class="cal-day-num">'+(prev-first+i+1)+'</span></div>';
  }
  for (var d=1;d<=days;d++) {
    var isToday   = d===today.getDate()   && mon===today.getMonth()   && y===today.getFullYear();
    var isSel     = d===selDate.getDate() && mon===selDate.getMonth() && y===selDate.getFullYear();
    var hasDot    = calBookingDates[y+'-'+String(mon+1).padStart(2,'0')+'-'+String(d).padStart(2,'0')];
    var cls = 'cal-day-cell' + (isToday?' is-today':'') + (isSel&&!isToday?' is-selected':'');
    html += '<div class="'+cls+'" onclick="jumpFromModal('+y+','+mon+','+d+')">' +
      '<span class="cal-day-num">'+d+'</span>' +
      (hasDot?'<div class="cal-day-dot"></div>':'') +
      '</div>';
  }
  document.getElementById('calDaysGrid').innerHTML = html;
}
async function jumpFromModal(y,m,d) {
  document.getElementById('calOverlay').classList.remove('open');
  var prev = currentDate.getMonth();
  currentDate = new Date(y,m,d);
  renderDateLabel();
  if (currentDate.getMonth()!==prev) await loadMonthDots(y,m);
  renderMiniCal();
  await loadBookings();
}

/* ── CURRENT TIME INDICATOR ── */
function renderTimeNowLine() {
  // Remove existing
  var old = document.getElementById('timeNowLine');
  if (old) old.remove();
  var now = new Date();
  var sel = currentDate;
  var isToday = now.getFullYear()===sel.getFullYear() && now.getMonth()===sel.getMonth() && now.getDate()===sel.getDate();
  if (!isToday) return;
  var mins = now.getHours()*60 + now.getMinutes();
  if (mins < DAY_START || mins > DAY_START + 11*60) return;
  var top = (mins - DAY_START) * PX_PER_MIN;
  var line = document.createElement('div');
  line.id = 'timeNowLine';
  line.className = 'time-now-line';
  line.style.top = top + 'px';
  line.innerHTML = '<div class="time-now-dot"></div>';
  var inner = document.getElementById('tlInner');
  if (inner) inner.appendChild(line);
}
