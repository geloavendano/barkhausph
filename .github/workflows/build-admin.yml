name: Build admin app

on:
  push:
    branches: [main]
    paths:
      - 'admin-src/**'
    # Don't re-trigger when the bot commits built files back
    tags-ignore: ['**']

# Prevent overlapping runs that cause the race condition
concurrency:
  group: build-admin
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: admin-src/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: admin-src

      - name: Build
        run: npm run build
        working-directory: admin-src
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Commit built files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add admin/
          git diff --cached --quiet || git commit -m "chore: build admin app [skip ci]"
          git push
